<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>PDA Yurest — Restaurante Voraz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500;600&display=block" rel="stylesheet">
  <style>
/* ════════════════════════════════
   PDA Yurest — Design tokens
   Heredado del TPV (DiseñoTPV.html)
   ════════════════════════════════ */
:root {
  --accent: #FF4D4D;
  --accent-light: #FF7070;
  --accent-soft: #FFECEC;
  --accent-strong: #E64242;
  --black: #0D0D0D;
  --gray-900: #1A1A1A;
  --gray-800: #2C2C2C;
  --gray-700: #3D3D3D;
  --gray-600: #525252;
  --gray-500: #7A7A7A;
  --gray-400: #A0A0A0;
  --gray-300: #C8C8C8;
  --gray-200: #E8E8E8;
  --gray-100: #F4F4F4;
  --gray-50:  #FAFAFA;
  --white: #FFFFFF;
  --green: #1A9E5A;
  --green-soft: #E8F7EF;
  --blue: #1A6FE8;
  --blue-soft: #EBF2FE;
  --amber: #E89E1A;
  --amber-soft: #FEF6E6;
  --font: 'DM Sans', sans-serif;
  --mono: 'DM Mono', monospace;
  --radius-xs: 6px;
  --radius-sm: 8px;
  --radius: 12px;
  --radius-lg: 16px;
  --radius-xl: 22px;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.06);
  --shadow:    0 4px 14px rgba(0,0,0,0.08);
  --shadow-lg: 0 12px 32px rgba(0,0,0,0.14);
  --safe-bottom: 14px; /* sobre la navbar de Android */
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  font-family: var(--font);
  background: #1a1a1a;
  color: var(--black);
  -webkit-font-smoothing: antialiased;
}

/* ── Layout app shell ───────────────── */
.pda-stage {
  width: 100vw;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  background: radial-gradient(ellipse at top, #2a2a2a, #0d0d0d);
}

.pda-stack {
  position: relative;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: var(--gray-50);
}

.pda-screen {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  background: var(--gray-50);
  overflow: hidden;
}

/* Animations: push (forward) / pop (back) / fade (tab switch) */
.pda-screen.enter-push { animation: enterPush 280ms cubic-bezier(.22,.9,.32,1) both; }
.pda-screen.exit-push  { animation: exitPush 280ms cubic-bezier(.22,.9,.32,1) both; }
.pda-screen.enter-pop  { animation: enterPop 280ms cubic-bezier(.22,.9,.32,1) both; }
.pda-screen.exit-pop   { animation: exitPop 280ms cubic-bezier(.22,.9,.32,1) both; }
.pda-screen.enter-fade { animation: enterFade 220ms ease both; }
.pda-screen.exit-fade  { animation: exitFade 220ms ease both; }

@keyframes enterPush { from { transform: translateX(100%); } to { transform: translateX(0); } }
@keyframes exitPush  { from { transform: translateX(0); } to { transform: translateX(-22%); opacity: .7; } }
@keyframes enterPop  { from { transform: translateX(-22%); opacity:.7; } to { transform: translateX(0); opacity:1; } }
@keyframes exitPop   { from { transform: translateX(0); } to { transform: translateX(100%); } }
@keyframes enterFade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
@keyframes exitFade  { from { opacity: 1; } to { opacity: 0; } }

/* ── Topbar ─────────────────────────── */
.tb {
  display: flex; align-items: center;
  padding: 0 12px; height: 52px;
  background: var(--white);
  border-bottom: 1px solid var(--gray-200);
  flex-shrink: 0;
  gap: 8px;
}
.tb-back {
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  border-radius: var(--radius-sm);
  background: transparent; border: none; cursor: pointer;
  color: var(--gray-800);
}
.tb-back:active { background: var(--gray-100); }
.tb-title { flex: 1; display: flex; flex-direction: column; min-width: 0; }
.tb-title-main { font-size: 15px; font-weight: 600; color: var(--black); line-height: 1.1; }
.tb-title-sub { font-size: 11px; color: var(--gray-500); margin-top: 2px; }
.tb-action {
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  border-radius: var(--radius-sm);
  background: transparent; border: 1px solid var(--gray-200); cursor: pointer;
  color: var(--gray-700);
  position: relative;
}
.tb-action.solid { background: var(--black); color: var(--white); border-color: var(--black); }
.tb-action-dot {
  position: absolute; top: 4px; right: 4px;
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--accent); border: 2px solid var(--white);
}

/* ── Bottom tab bar ──────────────────── */
.tabbar {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  background: var(--white);
  border-top: 1px solid var(--gray-200);
  padding: 6px 4px var(--safe-bottom);
  flex-shrink: 0;
}
.tab-item {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  padding: 8px 4px;
  background: transparent; border: none; cursor: pointer;
  color: var(--gray-500);
  font-family: var(--font);
  font-size: 10.5px;
  font-weight: 500;
  position: relative;
  border-radius: 12px;
  transition: color .15s;
}
.tab-item.active { color: var(--accent); }
.tab-item.active .tab-icon-wrap {
  background: var(--accent-soft);
}
.tab-icon-wrap {
  width: 56px; height: 28px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 14px;
  transition: background .15s;
}
.tab-badge {
  position: absolute; top: 4px; right: 50%; margin-right: -22px;
  min-width: 16px; height: 16px; padding: 0 4px;
  background: var(--accent); color: var(--white);
  font-size: 9px; font-weight: 700; font-family: var(--mono);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  border: 2px solid var(--white);
}

/* ── Generic helpers ──────────────────── */
.content {
  flex: 1;
  overflow-y: auto;
  padding: 14px;
}
.section-title {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--gray-500);
  margin: 0 4px 10px;
}
.row { display: flex; align-items: center; gap: 8px; }
.row-between { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.col { display: flex; flex-direction: column; }
.mono { font-family: var(--mono); }
.muted { color: var(--gray-500); }

/* ── Cards ─────────────────────────── */
.card {
  background: var(--white);
  border: 1.5px solid var(--gray-200);
  border-radius: var(--radius);
  padding: 14px;
}
.card.tap { cursor: pointer; transition: border-color .12s, box-shadow .12s, transform .08s; }
.card.tap:active { transform: scale(.98); border-color: var(--accent); }

/* ── Buttons ───────────────────────── */
.btn {
  display: inline-flex; align-items: center; justify-content: center;
  gap: 6px;
  font-family: var(--font);
  font-size: 14px; font-weight: 500;
  border-radius: var(--radius);
  padding: 12px 16px;
  border: 1.5px solid var(--gray-200);
  background: var(--white); color: var(--black);
  cursor: pointer;
  transition: all .12s;
}
.btn:active { transform: scale(.98); }
.btn-primary { background: var(--accent); color: var(--white); border-color: var(--accent); }
.btn-primary:active { background: var(--accent-strong); }
.btn-dark { background: var(--black); color: var(--white); border-color: var(--black); }
.btn-ghost { background: transparent; border-color: var(--gray-200); color: var(--gray-700); }
.btn-danger { background: var(--white); color: var(--accent); border-color: var(--accent-soft); }
.btn-block { width: 100%; }
.btn-lg { padding: 16px 18px; font-size: 15px; }
.btn-sm { padding: 8px 12px; font-size: 13px; border-radius: var(--radius-sm); }

/* ── Pills / chips ─────────────────── */
.chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 12px;
  background: var(--gray-100);
  border: none;
  border-radius: 100px;
  font-family: var(--font);
  font-size: 12.5px;
  font-weight: 500;
  color: var(--gray-700);
  cursor: pointer;
  white-space: nowrap;
}
.chip.active { background: var(--accent); color: var(--white); }
.chip-outline { background: transparent; border: 1px solid var(--gray-200); color: var(--gray-600); }

/* ── Action sheet / modal ───────────── */
.sheet-backdrop {
  position: absolute; inset: 0;
  background: rgba(0,0,0,.45);
  z-index: 20;
  animation: enterFade .2s ease both;
  display: flex; align-items: flex-end;
}
.sheet {
  width: 100%;
  background: var(--white);
  border-radius: 20px 20px 0 0;
  padding: 8px 0 calc(20px + var(--safe-bottom));
  animation: enterSheet .25s cubic-bezier(.22,.9,.32,1) both;
  max-height: 80%;
  overflow-y: auto;
}
@keyframes enterSheet { from { transform: translateY(100%); } to { transform: translateY(0); } }
.sheet-handle {
  width: 40px; height: 4px; border-radius: 2px;
  background: var(--gray-300);
  margin: 8px auto 12px;
}
.sheet-header {
  padding: 0 18px 12px;
  border-bottom: 1px solid var(--gray-100);
}
.sheet-title { font-size: 15px; font-weight: 600; color: var(--black); }
.sheet-sub { font-size: 12px; color: var(--gray-500); margin-top: 2px; }
.sheet-body { padding: 14px 18px; }

/* ── Toast ──────────────────────────── */
.toast {
  position: absolute;
  top: 56px; left: 50%; transform: translateX(-50%);
  background: var(--black); color: var(--white);
  padding: 10px 18px;
  border-radius: 100px;
  font-size: 13px;
  font-weight: 500;
  z-index: 50;
  box-shadow: var(--shadow);
  display: flex; align-items: center; gap: 8px;
  animation: toastIn .25s ease both, toastOut .25s ease forwards;
  animation-delay: 0s, 2.2s;
}
@keyframes toastIn { from { opacity: 0; transform: translate(-50%, -16px); } to { opacity: 1; transform: translate(-50%, 0); } }
@keyframes toastOut { to { opacity: 0; transform: translate(-50%, -16px); } }

/* ── Status badges ──────────────────── */
.status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.status-libre { background: var(--gray-300); }
.status-ocupada { background: var(--green); }
.status-cobrar { background: var(--blue); }
.status-aviso { background: var(--amber); }

.tag {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 8px;
  border-radius: 100px;
  font-size: 10.5px;
  font-weight: 600;
  letter-spacing: .3px;
  white-space: nowrap;
}
.tag-md { padding: 4px 10px; font-size: 11px; }
.tag-lg { padding: 6px 12px; font-size: 12px; }
.tag-green { background: var(--green-soft); color: var(--green); }
.tag-blue { background: var(--blue-soft); color: var(--blue); }
.tag-amber { background: var(--amber-soft); color: var(--amber); }
.tag-red { background: var(--accent-soft); color: var(--accent); }
.tag-gray { background: var(--gray-100); color: var(--gray-600); }
.tag-dark { background: var(--black); color: var(--white); }
.tag-outline { background: transparent; border: 1px solid var(--gray-200); color: var(--gray-600); }

/* ── Dark topbar (for sub-pages like caja-active) ─── */
.tb-dark {
  background: var(--black);
  border-bottom: none;
  color: var(--white);
}
.tb-dark .tb-title-main { color: var(--white); }
.tb-dark .tb-title-sub { color: rgba(255,255,255,.55); }
.tb-dark .tb-back { color: var(--white); }
.tb-dark .tb-action { background: rgba(255,255,255,.08); border-color: transparent; color: var(--white); }

/* ── Card dark variant ─── */
.card-dark { background: var(--black); color: var(--white); border-color: var(--black); }

/* ── Sheet full-screen ────────────────── */
.sheet.sheet-full {
  max-height: 100%;
  min-height: 90%;
  border-radius: 20px 20px 0 0;
}
.sheet-footer {
  padding: 12px 18px calc(12px + var(--safe-bottom));
  border-top: 1px solid var(--gray-100);
  background: var(--white);
  position: sticky;
  bottom: 0;
}

/* ── PIN modal ─────────────────────────── */
.pin-modal {
  background: var(--white);
  border-radius: 20px;
  padding: 24px 20px 22px;
  width: calc(100% - 32px);
  max-width: 340px;
  margin: auto;
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  animation: pin-in .22s cubic-bezier(.22,.9,.32,1) both;
  box-shadow: var(--shadow-lg);
}
@keyframes pin-in {
  from { transform: scale(.92); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}
.pin-close {
  position: absolute; top: 10px; right: 10px;
  width: 32px; height: 32px; border-radius: 50%;
  border: none; background: var(--gray-100);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: var(--gray-600);
}
.pin-icon-wrap {
  width: 48px; height: 48px; border-radius: 14px;
  background: var(--accent-soft);
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 10px;
}
.pin-title { font-size: 17px; font-weight: 600; color: var(--black); text-align: center; }
.pin-sub { font-size: 12px; color: var(--gray-500); margin-top: 3px; text-align: center; }
.pin-user {
  display: flex; align-items: center; gap: 8px;
  background: var(--gray-50); border: 1px solid var(--gray-200);
  border-radius: 100px; padding: 5px 12px 5px 5px;
  margin: 14px 0 12px;
  font-size: 12px; font-weight: 500; color: var(--gray-700);
}
.pin-user-avatar {
  width: 26px; height: 26px; border-radius: 50%;
  background: var(--accent); color: var(--white);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--mono); font-size: 10.5px; font-weight: 700;
}

/* ── Diners stepper grande (abrir mesa) ── */
.diners-stepper-lg {
  display: flex; align-items: center; justify-content: center;
  gap: 16px;
  background: var(--gray-50);
  padding: 12px 18px;
  border-radius: 16px;
}
.diners-stepper-lg .ds-btn {
  width: 44px; height: 44px; border-radius: '50%';
  border: 1.5px solid var(--gray-200);
  background: var(--white);
  font-size: 20px; font-weight: 500; color: var(--gray-700);
  cursor: pointer; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
}
.diners-stepper-lg .ds-btn:disabled { opacity: .4; cursor: not-allowed; }
.diners-stepper-lg .ds-btn-plus { background: var(--accent); color: var(--white); border-color: var(--accent); }
.diners-stepper-lg .ds-value {
  font-family: var(--mono);
  font-size: 38px; font-weight: 300; letter-spacing: -1.5px;
  min-width: 60px; text-align: center;
  color: var(--black);
}

/* ── Diners quick chips (abrir mesa) ─── */
.diners-quick {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px;
  margin-top: 12px;
}
.diners-quick .qchip {
  height: 40px;
  border: 1.5px solid var(--gray-200);
  background: var(--white);
  border-radius: 10px;
  font-family: var(--mono); font-size: 15px; font-weight: 600;
  color: var(--black); cursor: pointer;
}
.diners-quick .qchip.active {
  background: var(--accent); color: var(--white); border-color: var(--accent);
}

/* ── Mesa cards (grid view) ─── */
.mesa-card {
  background: var(--white);
  border: 1.5px solid var(--gray-200);
  border-radius: var(--radius);
  padding: 12px 8px;
  min-height: 92px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  position: relative; cursor: pointer;
  transition: all .15s;
}
.mesa-card:active { transform: scale(.97); }
.mesa-card.occupied { background: var(--black); border-color: var(--black); color: var(--white); }
.mesa-card.cobrar { background: var(--blue); border-color: var(--blue); color: var(--white); }
.mesa-card.reservada { background: var(--amber-soft); border-color: var(--amber); }
.mesa-card.selected {
  border-color: var(--accent); border-width: 2px;
  box-shadow: 0 0 0 3px var(--accent-soft);
}
.mesa-card.merge-mode { animation: shake-mesa .35s ease infinite alternate; }
.mesa-card.merge-selected {
  background: var(--accent); border-color: var(--accent); color: var(--white);
  animation: none;
}
.mesa-card.merged-group {
  background: linear-gradient(135deg, var(--black) 0%, var(--gray-800) 100%);
  border-color: var(--black);
  color: var(--white);
}
@keyframes shake-mesa {
  from { transform: rotate(-.6deg); }
  to { transform: rotate(.6deg); }
}

/* ── Merge mode bar ─── */
.merge-bar {
  background: linear-gradient(90deg, var(--accent) 0%, var(--accent-light) 100%);
  color: var(--white);
  padding: 10px 14px;
  display: flex; align-items: center; gap: 10px;
  font-size: 13px; font-weight: 500;
  animation: enterFade .2s ease both;
}

/* ── Stock badge ─── */
.stock-badge {
  position: absolute; top: 5px; left: 5px;
  background: var(--accent); color: var(--white);
  min-width: 18px; height: 18px; padding: 0 4px;
  border-radius: 9px;
  font-size: 9.5px; font-weight: 700; font-family: var(--mono);
  display: flex; align-items: center; justify-content: center;
}
.stock-badge.stock-low { background: var(--amber); }
.stock-badge.stock-zero { background: var(--gray-400); }

/* ── Hero card (caja) ─── */
.hero-card {
  background: linear-gradient(135deg, #1A9E5A 0%, #0E7A40 100%);
  color: var(--white);
  border-radius: 18px;
  padding: 18px 18px;
  position: relative;
  overflow: hidden;
}
.hero-card::before {
  content: '';
  position: absolute; top: -30px; right: -30px;
  width: 120px; height: 120px; border-radius: 50%;
  background: rgba(255,255,255,.07);
}
.hero-label {
  font-size: 11px; font-weight: 600; letter-spacing: 1px;
  text-transform: uppercase; opacity: .8;
}
.hero-value {
  font-family: var(--mono); font-size: 36px; font-weight: 300;
  letter-spacing: -1.5px; line-height: 1; margin-top: 6px;
}
.hero-value .hero-currency { font-size: .55em; opacity: .65; margin-left: 4px; }
.hero-sub { font-size: 11px; opacity: .75; margin-top: 8px; line-height: 1.4; }

/* ── KPI card ─── */
.kpi-card {
  background: var(--white);
  border: 1.5px solid var(--gray-200);
  border-radius: 14px;
  padding: 12px 14px;
  display: flex; flex-direction: column;
}
.kpi-value { font-family: var(--mono); font-size: 22px; font-weight: 500; color: var(--black); letter-spacing: -.5px; }
.kpi-label { font-size: 11px; color: var(--gray-500); font-weight: 500; margin-top: 4px; }

/* ── Wizard steps indicator ─── */
.wizard-steps { display: flex; align-items: center; gap: 6px; padding: 12px 14px; background: var(--white); border-bottom: 1px solid var(--gray-200); }
.wizard-step {
  display: flex; align-items: center; gap: 6px;
  font-size: 11px; font-weight: 600; color: var(--gray-400);
}
.wizard-step .ws-num {
  width: 22px; height: 22px; border-radius: 50%;
  background: var(--gray-200); color: var(--gray-500);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--mono); font-size: 11px; font-weight: 700;
}
.wizard-step.active { color: var(--accent); }
.wizard-step.active .ws-num { background: var(--accent); color: var(--white); }
.wizard-step.done .ws-num { background: var(--green); color: var(--white); }
.wizard-step.done { color: var(--green); }
.wizard-step-line { flex: 1; height: 1.5px; background: var(--gray-200); }
.wizard-step-line.done { background: var(--green); }

/* ── Avatar grid (quick users) ─── */
.user-chip-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.user-chip {
  display: flex; flex-direction: column; align-items: center;
  gap: 6px; padding: 12px 6px;
  border: 1.5px solid var(--gray-200);
  background: var(--white);
  border-radius: 12px;
  cursor: pointer;
}
.user-chip.selected {
  border-color: var(--accent); background: var(--accent-soft);
  box-shadow: 0 0 0 3px rgba(255,77,77,.12);
}
.user-chip-name {
  font-size: 11px; color: var(--gray-700); font-weight: 500;
  text-align: center; line-height: 1.2;
}

/* ── Animation: shake ─── */
@keyframes shake {
  10%, 90% { transform: translateX(-2px); }
  20%, 80% { transform: translateX(3px); }
  30%, 50%, 70% { transform: translateX(-5px); }
  40%, 60% { transform: translateX(5px); }
}
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>

<body>

// ─── Helpers ──────────────────────────────────────
function formatCents(cents) {
  if (cents == null) return '0,00';
  const v = (cents / 100).toFixed(2).replace('.', ',');
  return v;
}
function formatCentsEur(cents) { return formatCents(cents) + '€'; }
function fmt(amountEur) { return amountEur.toFixed(2).replace('.', ',') + '€'; }
function fmtTime(min) {
  if (min == null) return '';
  if (min < 60) return `${min} min`;
  const h = Math.floor(min / 60);
  const m = min % 60;
  return `${h}h ${m}m`;
}
function timeFromString(openedAt) {
  // openedAt = "21:14" or ISO
  if (!openedAt) return null;
  let openedDate;
  if (openedAt.includes('T')) openedDate = new Date(openedAt);
  else {
    const [h, m] = openedAt.split(':').map(Number);
    const d = new Date(); d.setHours(h, m, 0, 0);
    openedDate = d;
  }
  const minutes = Math.floor((Date.now() - openedDate.getTime()) / 60000);
  return Math.max(0, minutes);
}

// ─── AmountDisplay (céntimos → 12,50 €) ─────────
function AmountDisplay({ cents, label, large, color, suffix = '€' }) {
  const s = (cents / 100).toFixed(2);
  const [intPart, decPart] = s.split('.');
  return (
    <div style={{
      textAlign: 'center',
      padding: large ? '8px 0' : '4px 0',
    }}>
      {label && (
        <div style={{

      }}>

// ─── NumpadCents (teclado para introducir céntimos) ──
function NumpadCents({ value = 0, onChange, danger }) {
  const accent = danger ? 'var(--accent)' : 'var(--black)';
  const press = (k) => {
    if (k === 'C') return onChange(0);
    if (k === 'back') return onChange(Math.floor(value / 10));
    if (k === '00') return onChange(value * 100);
    const next = value * 10 + Number(k);
    if (next > 99999999) return;
    onChange(next);
  };
  const keys = ['1','2','3','4','5','6','7','8','9','C','0','back'];
  return (
    <div style={{
      display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)',
      gap: 6,
    }}>
      {keys.map(k => (
        <button key={k} onClick={() => press(k)} style={{
          height: 48, borderRadius: 12,
          border: '1.5px solid var(--gray-200)',
          background: k === 'C' ? 'var(--gray-100)' : 'var(--white)',
          fontFamily: 'var(--mono)', fontSize: 20, fontWeight: 500,
          color: k === 'C' ? 'var(--gray-600)' : accent,
          cursor: 'pointer',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          transition: 'background .1s, transform .08s',
        }}
        onTouchStart={() => {}}
        >
          {k === 'back' ? <Icon name="back" size={16}/> :
           k === 'C' ? <span style={{fontSize: 14, fontWeight: 600}}>C</span> :
           k}
        </button>
      ))}
    </div>
  );
}

// ─── Stepper +/- ────────────────────────────────
function Stepper({ value, onChange, min = 0, max = 99, size = 'md', disabled }) {
  const sz = size === 'sm' ? { btn: 28, font: 13, w: 32 }
           : size === 'lg' ? { btn: 40, font: 17, w: 44 }

  return (
    <div style={{

      opacity: disabled ? .5 : 1,
    }}>
      <button onClick={() => !disabled && value > min && onChange(value - 1)} style={{
        width: sz.btn, height: sz.btn, borderRadius: '50%',
        border: 'none', background: 'var(--white)',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        cursor: 'pointer', opacity: value <= min ? .4 : 1,

      <button onClick={() => !disabled && value < max && onChange(value + 1)} style={{
        width: sz.btn, height: sz.btn, borderRadius: '50%',

        display: 'flex', alignItems: 'center', justifyContent: 'center',

// ─── DinersStepper grande (Stepper para abrir mesa) ───
function DinersStepperLarge({ value, onChange, min = 1, max = 20, disabled }) {
  return (
    <div className="diners-stepper-lg">

        onClick={() => onChange(value - 1)}>−</button>
      <div className="ds-value">{value}</div>
      <button className="ds-btn ds-btn-plus" disabled={disabled || value >= max}
        onClick={() => onChange(value + 1)}>+</button>

}

// ─── PinAuthModal ───────────────────────────────
function PinAuthModal({ open, title, subtitle, onClose, onAuthenticated }) {
  const [pin, setPin] = useStateC('');
  const [err, setErr] = useStateC(false);
  const correct = window.YDATA.CURRENT_USER.pin;
  useEffectC(() => { if (open) { setPin(''); setErr(false); } }, [open]);
  if (!open) return null;
  const press = (k) => {
    if (err) setErr(false);
    if (k === 'back') return setPin(p => p.slice(0,-1));
    if (k === 'C') return setPin('');
    if (pin.length >= 4) return;
    const next = pin + k;
    setPin(next);
    if (next.length === 4) {
      setTimeout(() => {
        if (next === correct) onAuthenticated({ user: window.YDATA.CURRENT_USER });
        else { setErr(true); setTimeout(() => setPin(''), 350); }
      }, 150);
    }
  };
  const dots = [0,1,2,3].map(i => (
    <div key={i} style={{
      width: 12, height: 12, borderRadius: '50%',
      background: i < pin.length ? (err ? 'var(--accent)' : 'var(--black)') : 'transparent',
      border: `1.5px solid ${err ? 'var(--accent)' : 'var(--gray-300)'}`,
      transition: 'all .15s',
    }}/>
  ));
  return (
    <div className="sheet-backdrop" onClick={onClose}>
      <div className="pin-modal" onClick={e => e.stopPropagation()}>
        <button className="pin-close" onClick={onClose}>
          <Icon name="close" size={18}/>
        </button>
        <div className="pin-icon-wrap">
          <Icon name="lock" size={24} color="var(--accent)"/>
        </div>
        <div className="pin-title">{title}</div>
        {subtitle && <div className="pin-sub">{subtitle}</div>}
        <div className="pin-user">
          <div className="pin-user-avatar">{window.YDATA.CURRENT_USER.initials}</div>
          <span>{window.YDATA.CURRENT_USER.name}</span>
        </div>
        <div style={{display:'flex', gap: 12, marginBottom: 6,
          animation: err ? 'shake .35s' : 'none'}}>{dots}</div>
        <div style={{fontSize: 11, color: err ? 'var(--accent)' : 'var(--gray-500)',
          minHeight: 14, marginBottom: 12, fontWeight: 500}}>
          {err ? 'PIN incorrecto' : 'Introduce tu PIN'}
        </div>
        <div style={{width: 240}}>
          <NumpadCents value={pin === '' ? 0 : Number(pin)} onChange={() => {}}/>
          {/* Override with PIN-specific numpad */}
          <div style={{
            position: 'relative', marginTop: -212,
            display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 6,
          }}>
            {['1','2','3','4','5','6','7','8','9','C','0','back'].map(k => (
              <button key={k} onClick={() => press(k)} style={{
                height: 48, borderRadius: 12,
                border: '1.5px solid var(--gray-200)',
                background: k === 'C' ? 'var(--gray-100)' : 'var(--white)',
                fontFamily: 'var(--mono)', fontSize: 20, fontWeight: 500,
                color: 'var(--black)',
                cursor: 'pointer',
                display: 'flex', alignItems: 'center', justifyContent: 'center',
              }}>
                {k === 'back' ? <Icon name="back" size={16}/> :
                 k === 'C' ? 'C' : k}
              </button>
            ))}
          </div>
        </div>
        <div style={{fontSize: 11, color: 'var(--gray-400)', marginTop: 14}}>
          Sesión de 5 min · PIN del operador
        </div>
      </div>
    </div>
  );
}

function UserAvatar({ name, initials, size = 36 }) {

      width: size, height: size, borderRadius: '50%',

            style={{background:'var(--white)', color:'var(--accent)',
              border: 'none', padding:'6px 12px', borderRadius: 8,
              fontSize: 11, fontWeight: 700, cursor: 'pointer',
              opacity: mergeSelected.length < 2 ? .5 : 1}}>
            Fusionar
          </button>
        </div>
      )}

      <div className="content" style={{padding: '12px'}}>
        <div style={{display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap: 8}}>
          {filtered.map(t => {
            // Skip non-primary merged
            if (t.merged_table_group_id && merged[t.merged_table_group_id][0].id !== t.id) return null;
            const isMerged = !!t.merged_table_group_id;
            const groupTables = isMerged ? merged[t.merged_table_group_id] : null;
            return (
              <MesaCard key={t.id} t={t} groupTables={groupTables}
                selected={selectedId === t.id}
                mergeMode={mergeMode}
                mergeSelected={mergeSelected.includes(t.id)}
                onClick={() => {
                  if (mergeMode) toggleMergeSelection(t.id);
                  else setSelectedId(t.id);
                }}
              />
            );
          })}
        </div>
      </div>

      {/* Bottom detail sheet (Selected mesa) */}
      {selectedTable && !mergeMode && (
        <Sheet open={true} onClose={() => setSelectedId(null)}
          full={selectedTable.occupied}
          title={`${selectedTable.name} · ${ZONES.find(z=>z.id===selectedTable.zone_id)?.name}`}
          subtitle={selectedTable.occupied
            ? `${selectedTable.diners} comensales · abierta ${selectedTable.opened_at} · ${selectedTable.camarero}`
            : selectedTable.reserva ? `Reservada · ${selectedTable.reserva}` : `Capacidad ${selectedTable.capacidad}`}
        >
          <MesaDetail mesa={selectedTable}
            onNuevaComanda={() => { setSelectedId(null); nav.push({ name: 'comanda', mesa: selectedTable }); }}
            onAbrirMesa={() => requirePin('open-mesa', selectedTable)}
            onCerrarCuenta={() => requirePin('close-account', selectedTable)}
            onCobrar={() => requirePin('cobrar', selectedTable)}
            onMenuAction={(action) => {
              if (action === 'editar-comensales') setEditDinersModal(selectedTable);
              else if (action === 'separar') toast('Mesa separada', 'success');
              else if (action === 'juntar') { setMergeMode(true); setMergeSelected([selectedTable.id]); setSelectedId(null); }
              else if (action === 'traspasar') setTransferModal(selectedTable);
            }}
            toast={toast}
          />
        </Sheet>
      )}

      <PinAuthModal open={!!pinModal}
        title={
          pinModal?.action === 'open-mesa' ? 'Abrir mesa' :
          pinModal?.action === 'close-account' ? 'Cerrar cuenta' :
          pinModal?.action === 'cobrar' ? 'Cobrar' : 'Verificar'
        }
        subtitle="Verifica tu PIN para continuar"
        onClose={() => setPinModal(null)}
        onAuthenticated={onAuthenticated}
      />

      <Sheet open={!!openModal} onClose={() => setOpenModal(null)}
        title="Abrir mesa"
        subtitle={openModal ? `${openModal.name} · ${ZONES.find(z=>z.id===openModal.zone_id)?.name}` : ''}>
        {openModal && <AbrirMesaForm mesa={openModal}
          onConfirm={(diners) => {
            setOpenModal(null);
            toast(`Mesa ${openModal.name} abierta · ${diners} comensales`, 'success');
            nav.push({ name: 'comanda', mesa: {...openModal, diners} });
          }}
        />}
      </Sheet>

      <Sheet open={!!closeAccountModal} onClose={() => setCloseAccountModal(null)}
        title="Cerrar cuenta"
        subtitle={closeAccountModal ? `${closeAccountModal.name} · Total ${formatCentsEur(closeAccountModal.remaining_total)}` : ''}>
        <CerrarCuentaForm mesa={closeAccountModal}
          onConfirm={(closer) => {
            setCloseAccountModal(null);
            toast(`Cuenta cerrada por ${closer.name.split(' ')[0]} · pendiente de cobro`, 'success');
          }}
        />
      </Sheet>

      <Sheet open={!!editDinersModal} onClose={() => setEditDinersModal(null)}
        title="Editar comensales"
        subtitle={editDinersModal?.name}>
        {editDinersModal && <EditDinersForm mesa={editDinersModal}
          onConfirm={(n) => {
            setEditDinersModal(null);
            toast(`Comensales actualizados a ${n}`, 'success');
          }}
        />}
      </Sheet>

      <Sheet open={!!transferModal} onClose={() => setTransferModal(null)}
        title="Traspasar cuenta"
        subtitle={`Desde ${transferModal?.name}`}>
        {transferModal && <TransferForm fromMesa={transferModal}
          onConfirm={(toMesa) => {
            setTransferModal(null);
            toast(`Cuenta traspasada de ${transferModal.name} → ${toMesa.name}`, 'success');
          }}
        />}
      </Sheet>
    </>
  );
}

function StatPill({ label, value, dotClass }) {
  return (
    <div style={{background:'var(--gray-50)', borderRadius: 10, padding: '7px 9px'}}>
      <div style={{display:'flex', alignItems:'center', gap: 5}}>
        {dotClass && <span className={`status-dot ${dotClass}`}/>}
        <span style={{fontSize: 17, fontWeight: 600, fontFamily: 'var(--mono)', color: 'var(--black)'}}>{value}</span>
      </div>
      <div style={{fontSize: 10, color: 'var(--gray-500)', fontWeight: 500, marginTop: 1}}>{label}</div>
    </div>
  );
}

function MesaCard({ t, groupTables, selected, mergeMode, mergeSelected, onClick }) {
  const { OrderStatus } = window.YDATA;
  const isOccupied = t.occupied && t.status === OrderStatus.OPEN;
  const isCobrar = t.status === OrderStatus.TO_CHARGE;
  const isReservada = !t.occupied && t.reserva;
  const isMerged = !!groupTables && groupTables.length > 1;
  const classes = [
    'mesa-card',
    isOccupied && 'occupied',
    isCobrar && 'cobrar',
    isReservada && 'reservada',
    selected && 'selected',
    mergeMode && 'merge-mode',
    mergeSelected && 'merge-selected',
    isMerged && 'merged-group',
  ].filter(Boolean).join(' ');
  const totalCents = isMerged ? groupTables.reduce((s, x) => s + (x.remaining_total || 0), 0) : t.remaining_total;
  const totalDiners = isMerged ? groupTables.reduce((s, x) => s + (x.diners || 0), 0) : t.diners;
  const name = isMerged ? groupTables.map(x => x.name).join('+') : t.name;
  return (
    <button onClick={onClick} className={classes}>
      <div style={{
        fontFamily: 'var(--mono)', fontSize: name.length > 4 ? 14 : 20,
        fontWeight: 600, lineHeight: 1,
      }}>{name}</div>
      {!t.occupied && !isReservada && (
        <div style={{fontSize: 10, marginTop: 5, opacity: .65, fontWeight: 500}}>
          {t.capacidad} pax
        </div>
      )}
      {(isOccupied || isCobrar) && (
        <>
          <div style={{fontSize: 11, fontFamily:'var(--mono)', marginTop: 4, opacity: .7}}>
            {formatCentsEur(totalCents)}
          </div>
          <div style={{fontSize: 9, opacity: .55, marginTop: 1}}>
            {totalDiners} pax · {t.opened_at}
          </div>
        </>
      )}
      {isCobrar && (
        <div style={{
          position:'absolute', top: 4, right: 4,
          fontSize: 8, fontWeight: 700, letterSpacing: '.5px',
          background: 'rgba(255,255,255,.22)', color: 'var(--white)',
          padding: '2px 5px', borderRadius: 4,
        }}>COBRAR</div>
      )}
      {isReservada && (
        <>
          <div style={{fontSize: 9, color: 'var(--amber)', fontWeight: 700, letterSpacing: '.5px', marginTop: 4}}>
            RESERVADA
          </div>
          <div style={{fontSize: 9, color: 'var(--gray-600)', marginTop: 1, textAlign:'center'}}>
            {t.reserva?.split('·')[0]?.trim()}
          </div>
        </>
      )}
      {(isOccupied || isCobrar) && t.camarero && (
        <div style={{
          position:'absolute', top: 4, left: 4,
          fontSize: 8, fontWeight: 700,
          background: 'rgba(255,255,255,.22)',
          width: 16, height: 16, borderRadius: 8,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
        }}>{t.camarero}</div>
      )}
      {mergeMode && mergeSelected && (
        <div style={{
          position: 'absolute', top: 4, right: 4,
          width: 18, height: 18, borderRadius: 9,
          background: 'var(--white)', color: 'var(--accent)',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
        }}>
          <Icon name="check" size={12} strokeWidth={3}/>
        </div>
      )}
      {isMerged && (
        <div style={{
          position: 'absolute', bottom: 4, left: '50%', transform: 'translateX(-50%)',
          background: 'rgba(255,255,255,.18)',
          padding: '1px 6px', borderRadius: 6,
          fontSize: 8.5, fontWeight: 700, letterSpacing: '.4px',
          display: 'flex', alignItems: 'center', gap: 3,
        }}>
          <Icon name="merge" size={8}/> FUSIONADA
        </div>
      )}
    </button>
  );
}

// Detail sheet inner — pedido + acciones
// ════════════════════════════════════════════════════════
function MesaDetail({ mesa, onNuevaComanda, onAbrirMesa, onCerrarCuenta, onCobrar, onMenuAction, toast }) {
  const { OrderStatus, PEDIDO_T3_LINES, ZONES } = window.YDATA;
  const lines = mesa.occupied ? PEDIDO_T3_LINES : [];
  const subtotal = lines.reduce((s, l) => s + (l.price + (l.modifiers||[]).reduce((a,m)=>a+m.price,0)) * l.quantity, 0);
  const ivaTotal = subtotal * 0.10; // mock simplificado
  const total = subtotal;

  const [menuOpen, setMenuOpen] = useStateM(false);
  const [lineDetail, setLineDetail] = useStateM(null);

  if (!mesa.occupied) {
    return (
      <div style={{padding: '0 0 8px'}}>
        <div className="card" style={{padding: 14, marginBottom: 14, textAlign: 'center'}}>
          <div style={{fontSize: 36, marginBottom: 6}}>🍽️</div>
          <div style={{fontSize: 14, fontWeight: 600, color: 'var(--black)'}}>Mesa libre</div>
          <div style={{fontSize: 12, color: 'var(--gray-500)', marginTop: 3}}>
            Capacidad {mesa.capacidad} {mesa.capacidad === 1 ? 'comensal' : 'comensales'}
          </div>
          {mesa.reserva && (
            <div style={{marginTop: 10, padding:'8px 10px', background:'var(--amber-soft)', borderRadius: 10}}>
              <div style={{fontSize: 10, fontWeight: 700, color:'var(--amber)', letterSpacing: '.5px'}}>RESERVADA</div>
              <div style={{fontSize: 11.5, color:'var(--gray-700)', marginTop: 2}}>{mesa.reserva}</div>
            </div>
          )}
        </div>
        <button className="btn btn-primary btn-block btn-lg" onClick={onAbrirMesa}>
          <Icon name="lock" size={14}/> Abrir mesa
          <span style={{opacity: .55, fontSize: 10, marginLeft: 4}}>requiere PIN</span>
        </button>
      </div>
    );
  }

  return (
    <div style={{margin: '-4px 0 8px'}}>
      {/* Big total card */}
      <div className="card card-dark" style={{
        padding: '14px 16px', marginBottom: 12, position: 'relative',
      }}>
        <div className="row-between" style={{marginBottom: 6}}>
          <span style={{fontSize: 10, opacity: .55, letterSpacing: 1.2, textTransform: 'uppercase', fontWeight: 600}}>
            Total mesa
          </span>
          <span style={{fontSize: 10, opacity: .55, fontFamily: 'var(--mono)'}}>
            #{mesa.order_id?.replace('o-', '') || '----'}
          </span>
        </div>
        <div className="mono" style={{fontSize: 30, fontWeight: 300, letterSpacing: '-1.2px'}}>
          {formatCentsEur(total)}
        </div>
        <div className="row" style={{marginTop: 8, gap: 12, fontSize: 11, opacity: .7}}>
          <span style={{display:'inline-flex', alignItems:'center', gap:4}}>
            <Icon name="note" size={11}/> {lines.length} líneas
          </span>
          <span style={{display:'inline-flex', alignItems:'center', gap:4}}>
            <Icon name="users" size={11}/> {mesa.diners} comensales
          </span>
          <span style={{display:'inline-flex', alignItems:'center', gap:4}}>
            <Icon name="clock" size={11}/> {mesa.opened_at}
          </span>
        </div>
        <button onClick={() => setMenuOpen(true)} style={{
          position: 'absolute', top: 8, right: 8,
          width: 30, height: 30, borderRadius: 8,
          background: 'rgba(255,255,255,.1)', border: 'none',
          color: 'var(--white)', cursor: 'pointer',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
        }}>
          <Icon name="more" size={16}/>
        </button>
      </div>

      {/* Status banner */}
      {mesa.status === OrderStatus.TO_CHARGE && (
        <div style={{
          background: 'var(--blue-soft)', borderRadius: 10,
          padding: '8px 12px', marginBottom: 10,
          display: 'flex', alignItems: 'center', gap: 8,
          fontSize: 12, color: 'var(--blue)', fontWeight: 600,
        }}>
          <Icon name="cash" size={14}/>
          Cuenta cerrada — pendiente de cobro
        </div>
      )}

      {/* Action buttons */}
      {mesa.status === OrderStatus.TO_CHARGE ? (
        <button className="btn btn-primary btn-block btn-lg" onClick={onCobrar} style={{marginBottom: 10}}>
          <Icon name="cash" size={16}/> Cobrar {formatCentsEur(total)}
          <span style={{opacity: .55, fontSize: 10, marginLeft: 4}}>requiere PIN</span>
        </button>
      ) : (
        <>
          <button className="btn btn-primary btn-block btn-lg" onClick={onNuevaComanda} style={{marginBottom: 8}}>
            <Icon name="plus" size={16}/> Nueva comanda
          </button>
          <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap: 8, marginBottom: 12}}>
            <button className="btn btn-ghost" onClick={onCerrarCuenta}>
              <Icon name="cash" size={13}/> Cerrar cuenta
            </button>
            <button className="btn btn-ghost" onClick={() => toast('Ticket impreso')}>
              <Icon name="print" size={13}/> Imprimir
            </button>
          </div>
        </>
      )}

      {/* Líneas */}
      <div className="section-title">Líneas del pedido</div>
      <div className="card" style={{padding: 0, overflow: 'hidden', marginBottom: 12}}>
        {lines.map((l, i) => (
          <LineRow key={l.id} l={l}
            last={i === lines.length - 1}
            onClick={() => setLineDetail(l)}
          />
        ))}
      </div>

      {/* Totales */}
      <div className="card" style={{padding: '12px 14px'}}>
        <div className="row-between" style={{fontSize: 12, color: 'var(--gray-500)', marginBottom: 4}}>
          <span>Subtotal sin IVA</span>
          <span className="mono">{formatCentsEur(subtotal * 0.9)}</span>
        </div>
        <div className="row-between" style={{fontSize: 12, color: 'var(--gray-500)', marginBottom: 8}}>
          <span>Impuestos</span>
          <span className="mono">{formatCentsEur(subtotal * 0.1)}</span>
        </div>
        <div className="row-between" style={{fontSize: 15, fontWeight: 600,
          paddingTop: 8, borderTop: '1px solid var(--gray-200)'}}>
          <span>Total</span>
          <span className="mono">{formatCentsEur(total)}</span>
        </div>
      </div>

      {/* Menu dropdown */}
      <Sheet open={menuOpen} onClose={() => setMenuOpen(false)}
        title={`Opciones de ${mesa.name}`} subtitle="Acciones de mesa">
        <SheetItem icon="users" label="Editar comensales" sub={`Actual: ${mesa.diners}`}
          onClick={() => { setMenuOpen(false); onMenuAction('editar-comensales'); }}/>
        {mesa.merged_table_group_id && (
          <SheetItem icon="unmerge" label="Separar mesa" sub="Romper la fusión"
            onClick={() => { setMenuOpen(false); onMenuAction('separar'); }}/>
        )}
        <SheetItem icon="merge" label="Juntar con otra mesa" sub="Unificar cuentas"
          onClick={() => { setMenuOpen(false); onMenuAction('juntar'); }}/>
        <SheetItem icon="transfer" label="Traspasar cuenta" sub="Mover el pedido a otra mesa"
          onClick={() => { setMenuOpen(false); onMenuAction('traspasar'); }}/>
        <SheetItem icon="note" label="Imprimir cuenta provisional"
          onClick={() => { setMenuOpen(false); toast('Imprimiendo cuenta provisional…'); }}/>
        <SheetItem icon="trash" label="Cancelar pedido completo" sub="Requiere supervisor" danger
          onClick={() => { setMenuOpen(false); toast('Solicitando autorización supervisor'); }}/>
      </Sheet>

      {/* Line detail modal */}
      <Sheet open={!!lineDetail} onClose={() => setLineDetail(null)}
        title={lineDetail?.product_name}
        subtitle={lineDetail ? `${lineDetail.quantity}× · ${formatCentsEur(lineDetail.price * lineDetail.quantity)}` : ''}>
        {lineDetail && <LineDetailContent line={lineDetail}/>}
      </Sheet>
    </div>
  );
}

function LineRow({ l, last, onClick }) {
  const hasModifiers = (l.modifiers || []).length > 0;
  const statusTag = l.status === 'servido' ? {tone:'green', t:'Servido'}
                  : l.status === 'enviado' ? {tone:'blue', t:'En cocina'}
                  : {tone:'amber', t:'Pendiente'};
  return (
    <button onClick={onClick} style={{
      width: '100%',
      display: 'grid', gridTemplateColumns: '22px 1fr auto',
      gap: 10, padding: '11px 14px',
      borderBottom: last ? 'none' : '1px solid var(--gray-100)',
      background: 'var(--white)', border: 0,
      cursor: 'pointer', textAlign: 'left',
      fontFamily: 'var(--font)',
    }}>
      <div className="mono" style={{
        fontSize: 13, fontWeight: 600, color: 'var(--black)',
        textAlign: 'right', paddingTop: 1,
      }}>{l.quantity}</div>
      <div style={{minWidth: 0}}>
        <div style={{fontSize: 13, fontWeight: 500, color: 'var(--black)', lineHeight: 1.25}}>
          {l.product_name}
        </div>
        <div className="row" style={{gap: 5, marginTop: 3, flexWrap:'wrap'}}>
          <Tag tone={statusTag.tone}>{statusTag.t}</Tag>
          {l.variant_name && <Tag tone="gray">{l.variant_name}</Tag>}
          {l.punto && <Tag tone="red">{l.punto}</Tag>}
          {hasModifiers && (
            <span style={{fontSize: 10.5, color: 'var(--gray-500)'}}>
              +{l.modifiers.length} {l.modifiers.length === 1 ? 'extra' : 'extras'}
            </span>
          )}
        </div>
        {l.nota && (
          <div style={{fontSize: 10.5, color: 'var(--gray-500)', marginTop: 2, fontStyle: 'italic'}}>
            "{l.nota}"
          </div>
        )}
      </div>
      <div style={{textAlign: 'right'}}>
        <div className="mono" style={{fontSize: 13, fontWeight: 500, color: 'var(--black)', whiteSpace: 'nowrap'}}>
          {formatCentsEur((l.price + (l.modifiers||[]).reduce((a,m)=>a+m.price,0)) * l.quantity)}
        </div>
      </div>
    </button>
  );
}

  const accompaniments = (line.modifiers || []).filter(m => m.kind === 'accompaniment');
  const extras = (line.modifiers || []).filter(m => m.kind === 'extra');
  const modPrice = (line.modifiers || []).reduce((s, m) => s + m.price, 0);
  return (
    <>
      <div className="row" style={{gap: 10, marginBottom: 14, alignItems: 'center'}}>
        <div className="mono" style={{
          background: 'var(--gray-100)', borderRadius: 10,
          padding: '6px 10px', fontWeight: 700, fontSize: 16,
          color: 'var(--black)',
        }}>{line.quantity}×</div>
        <div style={{flex: 1}}>
          <div style={{fontSize: 15, fontWeight: 600, color: 'var(--black)'}}>{line.product_name}</div>
          {line.variant_name && (
            <div style={{fontSize: 11.5, color: 'var(--gray-500)', marginTop: 2}}>{line.variant_name}</div>
          )}
        </div>
      </div>

      {accompaniments.length > 0 && (
        <div style={{marginBottom: 12}}>
          <div className="section-title">Acompañamientos</div>
          {accompaniments.map(m => (
            <ModRow key={m.id} m={m}/>
          ))}
        </div>
      )}

      {extras.length > 0 && (
        <div style={{marginBottom: 12}}>
          <div className="section-title">Extras</div>
          {extras.map(m => (
            <ModRow key={m.id} m={m}/>
          ))}
        </div>
      )}

      {line.punto && (
        <div style={{marginBottom: 12}}>
          <div className="section-title">Punto de cocción</div>
          <Tag tone="red" size="md">{line.punto}</Tag>
        </div>
      )}

      <div className="card" style={{padding: 12, background: 'var(--gray-50)', border: 'none'}}>
        <div className="row-between" style={{fontSize: 12, color: 'var(--gray-500)', marginBottom: 4}}>
          <span>Precio unitario</span>
          <span className="mono">{formatCentsEur(line.price)}</span>
        </div>
        {modPrice > 0 && (
          <div className="row-between" style={{fontSize: 12, color: 'var(--gray-500)', marginBottom: 4}}>
            <span>Modificadores</span>
            <span className="mono">+{formatCentsEur(modPrice)}</span>
          </div>
        )}
        <div className="row-between" style={{fontSize: 14, fontWeight: 600,
          paddingTop: 6, borderTop: '1px solid var(--gray-200)', marginTop: 4}}>
          <span>Total</span>
          <span className="mono">{formatCentsEur((line.price + modPrice) * line.quantity)}</span>
        </div>
      </div>
    </>
  );
}

function ModRow({ m }) {
  return (
    <div style={{
      display: 'flex', justifyContent: 'space-between', padding: '6px 0',
      borderBottom: '1px solid var(--gray-100)',
    }}>
      <span style={{fontSize: 12.5, color: 'var(--black)'}}>{m.name}</span>
      <span className="mono" style={{
        fontSize: 12, fontWeight: 600,
        color: m.price === 0 ? 'var(--gray-400)' : 'var(--accent)',
      }}>
        {m.price === 0 ? 'Gratis' : '+' + formatCentsEur(m.price)}
      </span>
    </div>
  );
}

      <DinersStepperLarge value={diners} onChange={setDiners} min={1} max={20}/>
      <div className="diners-quick">
        {[1,2,3,4,5,6,7,8].map(n => (

  return (
    <div>
      <div style={{
        background: 'var(--blue-soft)', borderRadius: 10,
        padding: '10px 12px', marginBottom: 14,
        fontSize: 11.5, color: 'var(--blue)', lineHeight: 1.4,
        display: 'flex', alignItems: 'flex-start', gap: 8,

const { useState: useStateC, useMemo: useMemoC, useEffect: useEffectC } = React;

// ════════════════════════════════════════════════════════
// NUEVA COMANDA — selector de productos + carrito flotante
// ════════════════════════════════════════════════════════
function ScreenComanda({ nav, mesa, toast }) {
  const { FAMILIAS, PRODUCTOS } = window.YDATA;
  const [fam, setFam] = useStateC('todo');
  const [search, setSearch] = useStateC('');
  const [carrito, setCarrito] = useStateC([]); // [{prod, qty, modificadores}]
  const [modProd, setModProd] = useStateC(null);
  const [carritoOpen, setCarritoOpen] = useStateC(false);
  const [numpadOpen, setNumpadOpen] = useStateC(false);

  const productos = PRODUCTOS.filter(p =>
    (fam === 'todo' || p.fam === fam) &&
    (!search || p.name.toLowerCase().includes(search.toLowerCase()) || p.code.includes(search))
  );

  const total = carrito.reduce((s, c) => s + c.prod.precio * c.qty, 0);
  const totalQty = carrito.reduce((s, c) => s + c.qty, 0);

  const addProduct = (p, extra = {}) => {
    setCarrito(prev => {
      // Si no tiene modificadores, sumar cantidad de línea existente
      if (!extra.nota && !extra.tamano && !extra.comensal) {
        const idx = prev.findIndex(x => x.prod.id === p.id && !x.nota && !x.tamano && !x.comensal);
        if (idx >= 0) {
          const next = [...prev];
          next[idx] = {...next[idx], qty: next[idx].qty + 1};
          return next;
        }
      }
      return [...prev, { id: Date.now()+Math.random(), prod: p, qty: 1, ...extra }];
    });
    toast(`+ ${p.name}`);
  };

  return (
    <>
      <TopBar
        title="Nueva comanda"
        subtitle={`Mesa ${mesa.id} · ${mesa.zona.charAt(0).toUpperCase()+mesa.zona.slice(1)}`}
        onBack={() => nav.pop()}
        actions={<>
          <button className="tb-action" onClick={() => setNumpadOpen(true)}>
            <Icon name="search" size={18}/>
          </button>
        </>}
      />

      {/* Family chips */}
      <div style={{
        display:'flex', gap: 6, padding: '10px 12px',
        background: 'var(--white)',
        borderBottom: '1px solid var(--gray-200)',
        overflowX: 'auto',
        flexShrink: 0,
      }}>
        {FAMILIAS.map(f => (
          <button key={f.id}
            className={`chip ${fam === f.id ? 'active' : ''}`}
            onClick={() => setFam(f.id)}
          >{f.name}</button>
        ))}
      </div>

      {/* Search */}
      <div style={{
        padding: '10px 12px', flexShrink: 0,
        background: 'var(--white)',
        borderBottom: '1px solid var(--gray-200)',
      }}>
        <div style={{
          display: 'flex', alignItems: 'center', gap: 8,
          background: 'var(--gray-100)',
          borderRadius: 10, padding: '8px 12px',
        }}>
          <Icon name="search" size={14} color="var(--gray-400)"/>
          <input
            value={search}
            onChange={e => setSearch(e.target.value)}
            placeholder="Buscar producto o código…"
            style={{
              flex: 1, border: 'none', background: 'transparent',
              outline: 'none', fontFamily: 'var(--font)', fontSize: 13,
              color: 'var(--black)',
            }}
          />
          <button onClick={() => setNumpadOpen(true)} style={{
            background: 'var(--white)', border: '1px solid var(--gray-200)',
            padding: '4px 8px', borderRadius: 6,
            fontFamily: 'var(--mono)', fontSize: 10, fontWeight: 600,
            color: 'var(--gray-600)', cursor: 'pointer',
          }}>123</button>
        </div>
      </div>

      <div className="content" style={{padding: '12px', paddingBottom: carrito.length ? 84 : 12}}>
        <div style={{display:'grid', gridTemplateColumns:'repeat(2, 1fr)', gap: 8}}>
          {productos.map(p => (
            <ProductCard key={p.id} p={p}
              count={carrito.filter(c => c.prod.id === p.id).reduce((s,c)=>s+c.qty,0)}
              onTap={() => addProduct(p)}
              onLongPress={() => setModProd(p)}
            />
          ))}
        </div>
        {productos.length === 0 && (
          <div style={{textAlign:'center', padding:'40px 20px', color: 'var(--gray-400)'}}>
            <div style={{fontSize: 32, marginBottom: 8}}>🔎</div>
            <div style={{fontSize: 13}}>Sin resultados</div>
          </div>
        )}
      </div>

      {/* Carrito flotante */}
      {carrito.length > 0 && (
        <div style={{
          position: 'absolute', bottom: 14, left: 14, right: 14,
          background: 'var(--black)', color: 'var(--white)',
          borderRadius: 14,
          padding: '12px 16px',
          display: 'flex', alignItems: 'center', gap: 12,
          boxShadow: '0 8px 24px rgba(0,0,0,.25)',
          animation: 'fab-in .25s cubic-bezier(.22,.9,.32,1) both',
          cursor: 'pointer',
        }} onClick={() => nav.push({ name: 'resumen-comanda', mesa, carrito, addProduct, setCarrito })}>
          <div style={{
            background: 'var(--accent)',
            minWidth: 32, height: 32, borderRadius: 16,
            padding: '0 8px',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            fontWeight: 700, fontFamily: 'var(--mono)', fontSize: 14,
          }}>{totalQty}</div>
          <div style={{flex: 1, minWidth: 0}}>
            <div style={{fontSize: 13, fontWeight: 600}}>Revisar comanda</div>
            <div style={{fontSize: 10.5, opacity: .65}}>
              {carrito.length} {carrito.length === 1 ? 'línea' : 'líneas'} · Mesa {mesa.id}
            </div>
          </div>
          <div className="mono" style={{fontSize: 17, fontWeight: 600}}>{fmt(total)}</div>
          <Icon name="forward" size={16}/>
        </div>
      )}

      {/* Modificadores sheet */}
      <Sheet open={!!modProd} onClose={() => setModProd(null)}
        title={modProd?.name}
        subtitle={modProd ? `${fmt(modProd.precio)} · IVA ${modProd.iva}%` : ''}>
        {modProd && <ModificadoresPanel
          p={modProd}
          onAdd={(extra) => { addProduct(modProd, extra); setModProd(null); }}
        />}
      </Sheet>

      {/* Numpad de código rápido */}
      <Sheet open={numpadOpen} onClose={() => setNumpadOpen(false)} title="Código rápido"
        subtitle="Introduce el código del producto">
        <NumpadCodigo onConfirm={(code) => {
          const p = PRODUCTOS.find(p => p.code === code);
          if (p) { addProduct(p); setNumpadOpen(false); }
          else toast('Código no encontrado');
        }}/>
      </Sheet>

      <style>{`@keyframes fab-in { from {transform: translateY(20px); opacity: 0;} to {transform: translateY(0); opacity: 1;} }`}</style>
    </>
  );
}

function ProductCard({ p, count, onTap, onLongPress }) {
  const [pressing, setPressing] = useStateC(false);
  // long press handler
  const timer = React.useRef(null);
  const start = () => {
    setPressing(true);
    timer.current = setTimeout(() => {
      setPressing(false);
      onLongPress && onLongPress();
      timer.current = null;
    }, 450);
  };
  const end = (fire) => {
    setPressing(false);
    if (timer.current) {
      clearTimeout(timer.current);
      timer.current = null;
      if (fire) onTap();
    }
  };

  return (
    <button
      className="card"
      onMouseDown={start} onMouseUp={() => end(true)} onMouseLeave={() => end(false)}
      onTouchStart={start} onTouchEnd={() => end(true)} onTouchCancel={() => end(false)}
      style={{
        padding: '10px 8px 10px',
        display: 'grid',
        gridTemplateRows: '32px 32px 18px 16px',
        rowGap: 4,
        justifyItems: 'center', alignItems: 'center',
        textAlign: 'center',
        position: 'relative',
        transform: pressing ? 'scale(.97)' : 'scale(1)',
        borderColor: pressing ? 'var(--accent)' : 'var(--gray-200)',
        boxShadow: pressing ? '0 0 0 3px var(--accent-soft)' : 'none',
        transition: 'all .12s',
        cursor: 'pointer',
        background: 'var(--white)',
      }}>
      <div style={{fontSize: 26, lineHeight: 1}}>{p.emoji}</div>
      <div style={{
        fontSize: 11.5, fontWeight: 500, color: 'var(--black)', lineHeight: 1.2,
        display: '-webkit-box', WebkitLineClamp: 2, WebkitBoxOrient: 'vertical',
        overflow: 'hidden',
        width: '100%',
        wordBreak: 'break-word',
      }}>
        {p.name}
      </div>
      <div className="mono" style={{fontSize: 13, fontWeight: 600, color: 'var(--accent)', lineHeight: 1}}>
        {fmt(p.precio)}
      </div>
      <div style={{display:'flex', gap:3, alignItems:'center', minHeight: 16}}>
        {p.alergenos && p.alergenos.length > 0 && p.alergenos.slice(0,4).map(a => (
          <span key={a} style={{
            fontSize: 8, fontWeight: 700,
            background: 'var(--amber-soft)', color: 'var(--amber)',
            padding: '2px 4px', borderRadius: 4,
            fontFamily: 'var(--mono)',
            lineHeight: 1,
          }}>{a}</span>
        ))}
      </div>
      {count > 0 && (
        <div style={{
          position: 'absolute', top: 6, right: 6,
          background: 'var(--accent)', color: 'var(--white)',
          width: 20, height: 20, borderRadius: 10,
          fontSize: 11, fontWeight: 700, fontFamily: 'var(--mono)',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
        }}>{count}</div>
      )}
    </button>
  );
}

// Numpad para código rápido
// ════════════════════════════════════════════════════════
function NumpadCodigo({ onConfirm }) {
  const [code, setCode] = useStateC('');
  const onKey = (k) => {
    if (k === 'back') return setCode(c => c.slice(0,-1));
    if (k === 'ok') return onConfirm(code);
    if (code.length >= 5) return;
    setCode(c => c + k);
  };
  return (
    <div>
      <div style={{
        background: 'var(--gray-50)', borderRadius: 12,
        padding: '14px 16px',
        fontFamily: 'var(--mono)', fontSize: 26, fontWeight: 600,
        color: 'var(--black)',
        textAlign: 'center', letterSpacing: 4,
        marginBottom: 12,
        minHeight: 30,
      }}>{code || <span style={{color:'var(--gray-300)'}}>•••</span>}</div>
      <div style={{
        display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)',
        gap: 8,
      }}>
        {['1','2','3','4','5','6','7','8','9','back','0','ok'].map(k => (
          <button key={k} onClick={() => onKey(k)} style={{
            height: 52,
            borderRadius: 12,
            border: '1.5px solid var(--gray-200)',
            background: k === 'ok' ? 'var(--accent)' :
                        k === 'back' ? 'var(--gray-100)' : 'var(--white)',
            color: k === 'ok' ? 'var(--white)' : 'var(--black)',
            fontFamily: 'var(--mono)',
            fontSize: 19, fontWeight: 500,
            cursor: 'pointer',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
          }}>
            {k === 'back' ? <Icon name="back" size={16}/> :
             k === 'ok' ? <Icon name="check" size={18}/> : k}
          </button>
        ))}
      </div>
    </div>
  );
}

// RESUMEN COMANDA — revisar antes de enviar a cocina
// ════════════════════════════════════════════════════════
function ScreenResumenComanda({ nav, mesa, carrito, setCarrito, toast }) {
  const [items, setItems] = useStateC(carrito);

  // Group by comensal
  const byComensal = useMemoC(() => {
    const m = {};
    items.forEach(it => {
      const k = it.comensal || 0;
      if (!m[k]) m[k] = [];
      m[k].push(it);
    });
    return m;
  }, [items]);

  const comensalKeys = Object.keys(byComensal).sort((a,b) =>
    a === '0' ? 1 : b === '0' ? -1 : Number(a) - Number(b));

  const total = items.reduce((s,c) => s + c.prod.precio * c.qty, 0);
  const totalQty = items.reduce((s,c) => s + c.qty, 0);

  const updateQty = (id, delta) => {
    setItems(prev => prev.map(it => it.id === id ? {...it, qty: Math.max(0, it.qty + delta)} : it).filter(it => it.qty > 0));
  };

  return (
    <>
      <TopBar
        title="Revisar comanda"
        subtitle={`Mesa ${mesa.id} · ${totalQty} productos`}
        onBack={() => { setCarrito && setCarrito(items); nav.pop(); }}
      />

      <div className="content" style={{padding: '12px'}}>
        {items.length === 0 ? (
          <div style={{textAlign:'center', padding:'40px 20px', color:'var(--gray-400)'}}>
            <div style={{fontSize: 32, marginBottom: 8}}>🛒</div>
            <div style={{fontSize: 14, fontWeight: 500, color:'var(--gray-600)'}}>Carrito vacío</div>
          </div>
        ) : (
          comensalKeys.map(k => (
            <div key={k} style={{marginBottom: 12}}>
              <div className="section-title row" style={{justifyContent:'space-between', marginRight: 0}}>
                <span>{k === '0' ? 'Compartido / mesa' : `Comensal ${k}`}</span>
                <span style={{fontFamily:'var(--mono)', textTransform:'none', letterSpacing: 0}}>
                  {byComensal[k].length} ítems
                </span>
              </div>
              <div className="card" style={{padding: 0, overflow:'hidden'}}>
                {byComensal[k].map((it, i, arr) => (

        <div style={{fontSize: 13, color: 'var(--gray-500)', textAlign:'center', marginTop: 6}}>

                  <div style={{fontSize: 11, color: 'var(--gray-500)'}}>{pr.count} {pr.count === 1 ? 'producto' : 'productos'}</div>

// CAMBIAR MESA / JUNTAR MESAS
// ════════════════════════════════════════════════════════
function ScreenCambiarMesa({ nav, mesa, mode, toast }) {
  // mode: 'cambiar' | 'juntar'
  const { ZONAS, MESAS } = window.YDATA;
  const [zona, setZona] = useStateC(mesa.zona);
  const [sel, setSel] = useStateC([]);

  const isJuntar = mode === 'juntar';
  const candidatas = MESAS.filter(m => m.id !== mesa.id && (isJuntar ? m.estado === 'ocupada' : m.estado === 'libre'));
  const filtradas = candidatas.filter(m => m.zona === zona);

  const toggle = (id) => {
    if (isJuntar) {
      setSel(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);
    } else {
      setSel([id]);
    }
  };

  return (
    <>
      <TopBar
        title={isJuntar ? 'Juntar mesas' : 'Cambiar mesa'}
        subtitle={`Desde Mesa ${mesa.id} (${mesa.zona})`}
        onBack={() => nav.pop()}
      />

      <div style={{
        padding: '14px 14px 0',
        flexShrink: 0,
      }}>
        <div className="card" style={{
          background: 'var(--blue-soft)', borderColor: 'var(--blue-soft)',
          padding: '10px 12px',
          display: 'flex', alignItems: 'center', gap: 10,
        }}>
          <Icon name="info" size={16} color="var(--blue)"/>
          <div style={{fontSize: 11.5, color: 'var(--blue)', lineHeight: 1.4}}>
            {isJuntar
              ? 'Selecciona una o más mesas para unificar la cuenta con la actual.'
              : 'Selecciona una mesa libre para mover el pedido actual.'}
          </div>
        </div>
      </div>

      <div style={{
        display:'flex', gap: 6, padding: '12px',
        overflowX: 'auto',
        flexShrink: 0,
      }}>
        {ZONAS.map(z => (
          <button key={z.id}
            className={`chip ${zona === z.id ? 'active' : ''}`}
            onClick={() => setZona(z.id)}
          >{z.name}</button>
        ))}
      </div>

      <div className="content" style={{padding: '0 12px 12px'}}>
        <div style={{display:'grid', gridTemplateColumns:'repeat(3, 1fr)', gap: 8}}>
          {filtradas.map(m => (
            <button key={m.id} onClick={() => toggle(m.id)} className="card" style={{
              padding: '14px 8px',
              minHeight: 80,
              display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
              borderColor: sel.includes(m.id) ? 'var(--accent)' : 'var(--gray-200)',
              borderWidth: sel.includes(m.id) ? '2px' : '1.5px',
              boxShadow: sel.includes(m.id) ? '0 0 0 3px var(--accent-soft)' : 'none',
              cursor: 'pointer',
              position: 'relative',
              background: isJuntar && m.estado === 'ocupada' ? 'var(--black)' :
                          (!isJuntar && m.estado === 'libre') ? 'var(--white)' : 'var(--white)',
              color: isJuntar && m.estado === 'ocupada' ? 'var(--white)' : 'var(--black)',
            }}>
              <div className="mono" style={{fontSize: 20, fontWeight: 600, lineHeight: 1}}>{m.id}</div>
              <div style={{fontSize: 10, marginTop: 6, opacity: .7}}>
                {isJuntar
                  ? `${m.comensales} pax · ${fmt(m.total)}`
                  : `${m.capacidad} pax`}
              </div>
              {sel.includes(m.id) && (
                <div style={{
                  position: 'absolute', top: 4, right: 4,
                  width: 18, height: 18, borderRadius: 9,
                  background: 'var(--accent)', color: 'var(--white)',
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                }}>
                  <Icon name="check" size={12} strokeWidth={3}/>
                </div>
              )}
            </button>
          ))}
        </div>
        {filtradas.length === 0 && (
          <div style={{textAlign:'center', padding: '32px 20px', color:'var(--gray-400)', fontSize: 13}}>
            Sin mesas {isJuntar ? 'ocupadas' : 'libres'} en esta zona
          </div>
        )}
      </div>

      <div style={{
        padding: '10px 12px',
        background: 'var(--white)',
        borderTop: '1px solid var(--gray-200)',
        flexShrink: 0,
      }}>
        <button className="btn btn-primary btn-block btn-lg"
          disabled={sel.length === 0}
          onClick={() => {
            toast(isJuntar
              ? `Mesa ${mesa.id} juntada con ${sel.join(', ')}`
              : `Pedido movido de ${mesa.id} → ${sel[0]}`);
            nav.pop();
            nav.pop();
          }}>
          {isJuntar
            ? `Juntar ${sel.length} ${sel.length === 1 ? 'mesa' : 'mesas'}`
            : `Mover a Mesa ${sel[0] || '…'}`}
        </button>
      </div>
    </>
  );
}

const { useState: useStateB, useMemo: useMemoB } = React;

function ScreenCobro({ nav, mesa, total, toast }) {
  const [mode, setMode] = useStateB('select'); // select | efectivo | tarjeta | dividir | done
  const [efectivoCobrado, setEfectivoCobrado] = useStateB(null);
  const [metodo, setMetodo] = useStateB(null);

  if (mode === 'efectivo') {
    return <CobroEfectivo total={total} onBack={() => setMode('select')}
      onDone={(cobrado) => { setEfectivoCobrado(cobrado); setMetodo('Efectivo'); setMode('done'); }}/>;
  }
  if (mode === 'tarjeta') {
    return <CobroTarjeta total={total} onBack={() => setMode('select')}
      onDone={() => { setMetodo('Tarjeta'); setMode('done'); }}/>;
  }
  if (mode === 'dividir') {
    return <CobroDividir mesa={mesa} total={total} onBack={() => setMode('select')}
      onDone={() => { setMetodo('Dividido'); setMode('done'); }}/>;
  }
  if (mode === 'done') {
    return <CobroDone mesa={mesa} total={total} metodo={metodo}

          textAlign: 'center',
        }}>
          <div style={{fontSize: 11, letterSpacing: 1.5, textTransform: 'uppercase', opacity: .55, fontWeight: 600}}>
            Importe total
          </div>
          <div className="mono" style={{fontSize: 44, fontWeight: 300, letterSpacing: '-1.5px', marginTop: 4, lineHeight: 1}}>
            {fmt(total)}
          </div>
          <div style={{fontSize: 11.5, opacity: .55, marginTop: 6}}>
            IVA incluido · {Math.floor(Math.random()*8)+4} líneas
          </div>

        <div className="section-title">Método de pago</div>

        <div style={{display: 'grid', gap: 10, marginBottom: 16}}>
          <MetodoBtn

            onClick={() => toast('Imprimiendo cuenta provisional')}/>
          <SheetItem icon="note" label="Aplicar descuento" sub="Requiere autorización"
            onClick={() => toast('Descuento solicitado')}/>

// ────── EFECTIVO ──────────────────────────────────────
function CobroEfectivo({ total, onBack, onDone }) {
  const [cobrado, setCobrado] = useStateB('');
  const num = parseFloat(cobrado.replace(',', '.')) || 0;
  const cambio = num - total;
  const sugerencias = [
    Math.ceil(total),
    Math.ceil(total/5)*5,
    Math.ceil(total/10)*10,
    Math.ceil(total/20)*20,
    Math.ceil(total/50)*50,
  ].filter((v,i,arr) => v >= total && arr.indexOf(v) === i).slice(0, 4);

  const onKey = (k) => {
    if (k === 'back') return setCobrado(c => c.slice(0,-1));
    if (k === 'clear') return setCobrado('');
    if (k === ',') {
      if (cobrado.includes(',')) return;
      return setCobrado(c => (c || '0') + ',');
    }
    setCobrado(c => c + k);
  };

  return (
    <>
      <TopBar title="Pago en efectivo" subtitle={`Total ${fmt(total)}`} onBack={onBack}/>

      <div className="content" style={{padding: '14px'}}>
        <div style={{
          background: 'var(--white)', borderRadius: 14,
          padding: '16px 16px 12px',
          border: '1.5px solid var(--gray-200)',
          marginBottom: 12,
        }}>
          <div className="row-between" style={{marginBottom: 8}}>
            <span style={{fontSize: 12, color: 'var(--gray-500)', fontWeight: 500}}>Recibido</span>
            <span className="mono" style={{fontSize: 28, fontWeight: 500, color:'var(--black)'}}>
              {cobrado || '0'},{cobrado.includes(',') ? '' : '00'}<span style={{color:'var(--gray-300)'}}>€</span>
            </span>
          </div>
          <div className="row-between" style={{paddingTop: 12, borderTop: '1px dashed var(--gray-200)'}}>
            <span style={{fontSize: 12, color: 'var(--gray-500)', fontWeight: 500}}>Cambio</span>
            <span className="mono" style={{
              fontSize: 22, fontWeight: 600,
              color: cambio < 0 ? 'var(--accent)' : cambio === 0 ? 'var(--black)' : 'var(--green)',
            }}>
              {cambio < 0 ? '−' : ''}{fmt(Math.abs(cambio))}
            </span>
          </div>
        </div>

        <div className="section-title">Sugerencias</div>
        <div className="row" style={{gap: 6, flexWrap: 'wrap', marginBottom: 14}}>
          {sugerencias.map(v => (
            <button key={v} className="chip chip-outline"
              onClick={() => setCobrado(v.toFixed(2).replace('.', ','))}>
              <span className="mono">{fmt(v)}</span>
            </button>
          ))}
          <button className="chip chip-outline"
            onClick={() => setCobrado(total.toFixed(2).replace('.', ','))}>
            Importe justo
          </button>
        </div>

        {/* Numpad */}
        <div style={{
          display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)',
          gap: 8,
        }}>
          {['1','2','3','4','5','6','7','8','9',',','0','back'].map(k => (
            <button key={k} onClick={() => onKey(k)} style={{
              height: 50, borderRadius: 12,
              border: '1.5px solid var(--gray-200)',
              background: k === 'back' ? 'var(--gray-100)' : 'var(--white)',
              fontFamily: 'var(--mono)', fontSize: 22, fontWeight: 500,
              color: 'var(--black)',
              cursor: 'pointer',
              display: 'flex', alignItems: 'center', justifyContent: 'center',
            }}>
              {k === 'back' ? <Icon name="back" size={16}/> : k}
            </button>
          ))}
        </div>
      </div>

      <div style={{
        padding: '10px 12px',
        background: 'var(--white)',
        borderTop: '1px solid var(--gray-200)',
        flexShrink: 0,
      }}>
        <button className="btn btn-primary btn-block btn-lg"
          disabled={num < total}
          onClick={() => onDone(num)}>
          <Icon name="check" size={16}/> Confirmar cobro
        </button>
      </div>
    </>
  );
}

// ────── TARJETA ───────────────────────────────────────
function CobroTarjeta({ total, onBack, onDone }) {
  const [step, setStep] = useStateB(0); // 0: connecting, 1: insert, 2: processing, 3: done

  React.useEffect(() => {
    if (step === 0) { const t = setTimeout(() => setStep(1), 1100); return () => clearTimeout(t); }
    if (step === 2) { const t = setTimeout(() => setStep(3), 1300); return () => clearTimeout(t); }
    if (step === 3) { const t = setTimeout(() => onDone(), 900); return () => clearTimeout(t); }
  }, [step]);

  const stages = ['Conectando con TPV…', 'Inserta o acerca la tarjeta', 'Procesando pago…', 'Pago aprobado'];
  const subs = [
    'Estableciendo conexión Bluetooth',
    `Importe ${fmt(total)} · TPV Yurest #A47`,
    'No retires la tarjeta',
    `Importe ${fmt(total)} cargado correctamente`,
  ];

  return (
    <>
      <TopBar title="Pago con tarjeta" subtitle={`Total ${fmt(total)}`} onBack={onBack}/>

      <div className="content" style={{
        padding: '40px 24px',
        display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
      }}>
        <div style={{
          width: 200, height: 130,
          background: step === 3 ? 'linear-gradient(135deg, #1A9E5A 0%, #0E7A40 100%)' :
                      'linear-gradient(135deg, #2C2C2C 0%, #000 100%)',
          color: 'var(--white)',
          borderRadius: 14,
          padding: 16,
          position: 'relative',
          marginBottom: 24,
          boxShadow: '0 20px 40px rgba(0,0,0,.2)',
          animation: step === 1 ? 'cardPulse 1.5s ease infinite' :
                     step === 2 ? 'cardSpin .8s linear infinite' : 'none',
          display: 'flex', flexDirection: 'column', justifyContent: 'space-between',
        }}>
          <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start'}}>
            <Icon name="card" size={22} color="rgba(255,255,255,.5)"/>
            <div style={{
              width: 28, height: 22, borderRadius: 3,
              background: 'linear-gradient(135deg, #d4b87d, #b89759)',
            }}/>
          </div>
          <div style={{fontFamily: 'var(--mono)', fontSize: 13, letterSpacing: 2}}>
            •••• •••• •••• ••42
          </div>
        </div>

        <div style={{fontSize: 18, fontWeight: 600, color: 'var(--black)', textAlign:'center'}}>
          {stages[step]}
        </div>
        <div style={{fontSize: 12.5, color: 'var(--gray-500)', textAlign: 'center', marginTop: 6}}>
          {subs[step]}

          <button className="btn btn-primary" style={{marginTop: 28, minWidth: 200}}

            Simular tarjeta acercada
