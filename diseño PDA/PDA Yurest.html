        )}
        {step === 3 && (
          <div style={{marginTop: 28, fontFamily: 'var(--mono)', fontSize: 11, color: 'var(--gray-500)', textAlign: 'center'}}>
            AUT: 047221 · TVR 0080048000 · AID A0000000031010
          </div>
        )}
      </div>

      <style>{`
        @keyframes cardPulse {
          0%, 100% { transform: scale(1); box-shadow: 0 20px 40px rgba(0,0,0,.2); }
          50% { transform: scale(1.05); box-shadow: 0 25px 50px rgba(0,0,0,.3); }
        }
        @keyframes cardSpin {
          from { transform: rotate(0); } to { transform: rotate(360deg); }
        }
      `}</style>
    </>
  );
}

// ────── DIVIDIR CUENTA ────────────────────────────────
function CobroDividir({ mesa, total, onBack, onDone }) {
  const { PEDIDO_T3 } = window.YDATA;
  const [mode, setMode] = useStateB('iguales'); // iguales | productos | comensal
  const [partes, setPartes] = useStateB(mesa.comensales || 2);
  const [seleccionados, setSeleccionados] = useStateB({});
  const [pagados, setPagados] = useStateB([]); // ids pagados

  const lineas = PEDIDO_T3;
  const totalSel = lineas.reduce((s, l) => s + (seleccionados[l.id] ? l.precio * l.qty : 0), 0);
  const restante = total - pagados.reduce((s, p) => s + p, 0);
  const porParte = total / partes;

  return (
    <>
      <TopBar
        title="Dividir cuenta"
        subtitle={`Mesa ${mesa.id} · Total ${fmt(total)}`}
        onBack={onBack}
      />

      {/* Mode tabs */}
      <div style={{
        display:'flex', gap: 6, padding: '10px 12px',
        background: 'var(--white)', borderBottom: '1px solid var(--gray-200)',
        flexShrink: 0,
      }}>
        <button className={`chip ${mode==='iguales'?'active':''}`} onClick={() => setMode('iguales')}>
          Partes iguales
        </button>
        <button className={`chip ${mode==='productos'?'active':''}`} onClick={() => setMode('productos')}>
          Por productos
        </button>
        <button className={`chip ${mode==='comensal'?'active':''}`} onClick={() => setMode('comensal')}>
          Por comensal
        </button>
      </div>

      <div className="content" style={{padding: '14px'}}>
        {mode === 'iguales' && (
          <>
            <div className="card" style={{padding: '14px', marginBottom: 14, textAlign: 'center'}}>
              <div style={{fontSize: 11, color:'var(--gray-500)', letterSpacing: 1, textTransform:'uppercase', fontWeight: 600}}>
                Dividir entre
              </div>
              <div style={{display:'flex', alignItems:'center', justifyContent:'center', gap: 14, margin: '12px 0'}}>
                <button onClick={() => setPartes(p => Math.max(2, p-1))} style={{
                  width: 40, height: 40, borderRadius: 20,
                  border: '1.5px solid var(--gray-200)', background:'var(--white)',
                  cursor: 'pointer', display:'flex', alignItems:'center', justifyContent:'center',
                }}><Icon name="minus" size={16}/></button>
                <div className="mono" style={{fontSize: 40, fontWeight: 300, color:'var(--black)', minWidth: 60}}>
                  {partes}
                </div>
                <button onClick={() => setPartes(p => Math.min(20, p+1))} style={{
                  width: 40, height: 40, borderRadius: 20,
                  border: 'none', background: 'var(--accent)', color: 'var(--white)',
                  cursor: 'pointer', display:'flex', alignItems:'center', justifyContent:'center',
                }}><Icon name="plus" size={16}/></button>
              </div>
              <div style={{fontSize: 12, color: 'var(--gray-500)'}}>partes</div>
            </div>

            <div className="card" style={{padding: '14px'}}>
              <div className="row-between">
                <span style={{fontSize: 13, color:'var(--gray-700)'}}>Cada parte paga</span>
                <span className="mono" style={{fontSize: 22, fontWeight: 600, color: 'var(--accent)'}}>
                  {fmt(porParte)}
                </span>
              </div>
              <div style={{fontSize: 11, color: 'var(--gray-500)', marginTop: 4}}>
                Total {fmt(total)} ÷ {partes}
              </div>
            </div>

            <div style={{
              marginTop: 14, display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)',
              gap: 6,
            }}>
              {Array.from({length: partes}, (_, i) => {
                const isPagado = i < pagados.length;
                return (
                  <button key={i} onClick={() => {
                    if (!isPagado) setPagados(p => [...p, porParte]);
                  }} className="card" style={{
                    padding: '10px 6px',
                    minHeight: 64,
                    display: 'flex', flexDirection: 'column', alignItems:'center', justifyContent:'center',
                    background: isPagado ? 'var(--green-soft)' : 'var(--white)',
                    borderColor: isPagado ? 'var(--green)' : 'var(--gray-200)',
                    cursor: isPagado ? 'default' : 'pointer',
                  }}>
                    <div style={{fontSize: 10, fontWeight: 600, color: isPagado ? 'var(--green)' : 'var(--gray-500)', letterSpacing: '.5px'}}>
                      P{i+1}
                    </div>
                    <div className="mono" style={{fontSize: 12, fontWeight: 500, marginTop: 4, color: isPagado ? 'var(--green)' : 'var(--black)'}}>
                      {fmt(porParte)}
                    </div>
                    {isPagado && <Icon name="check" size={12} color="var(--green)" strokeWidth={3}/>}
                  </button>
                );
              })}
            </div>
          </>
        )}

        {mode === 'productos' && (
          <>
            <div className="card" style={{padding: 0, overflow:'hidden', marginBottom: 14}}>
              {lineas.map((l, i) => (
                <button key={l.id} onClick={() => setSeleccionados(s => ({...s, [l.id]: !s[l.id]}))} style={{
                  width: '100%', display: 'grid', gridTemplateColumns: '24px 28px 1fr auto',
                  gap: 10, padding: '10px 12px',
                  borderBottom: i === lineas.length-1 ? 'none' : '1px solid var(--gray-100)',
                  background: seleccionados[l.id] ? 'var(--accent-soft)' : 'var(--white)',
                  border: 0, cursor: 'pointer', textAlign: 'left',
                  fontFamily: 'var(--font)',
                }}>
                  <div style={{
                    width: 20, height: 20, borderRadius: 4,
                    border: `1.5px solid ${seleccionados[l.id] ? 'var(--accent)' : 'var(--gray-300)'}`,
                    background: seleccionados[l.id] ? 'var(--accent)' : 'var(--white)',
                    display: 'flex', alignItems: 'center', justifyContent: 'center',
                  }}>
                    {seleccionados[l.id] && <Icon name="check" size={12} color="var(--white)" strokeWidth={3}/>}
                  </div>
                  <div className="mono" style={{fontSize: 12, fontWeight: 600, color:'var(--black)'}}>
                    {l.qty}×
                  </div>
                  <div style={{fontSize: 12.5, color:'var(--black)', minWidth: 0}}>
                    {l.producto}
                  </div>
                  <div className="mono" style={{fontSize: 12.5, fontWeight: 500}}>
                    {fmt(l.precio * l.qty)}
                  </div>
                </button>
              ))}
            </div>

            <div className="card" style={{padding: '12px 14px',
              background: 'var(--black)', color: 'var(--white)', borderColor:'var(--black)'}}>
              <div className="row-between">
                <span style={{fontSize: 12, opacity: .7}}>Seleccionado</span>
                <span className="mono" style={{fontSize: 20, fontWeight: 600}}>{fmt(totalSel)}</span>
              </div>
              <div style={{fontSize: 11, opacity: .55, marginTop: 4}}>
                Resto pendiente: {fmt(total - totalSel - pagados.reduce((s,p)=>s+p,0))}
              </div>
            </div>
          </>
        )}

        {mode === 'comensal' && (
          <>
            {[1,2,3,4].map(c => {
              const ls = lineas.filter(l => l.comensal === c);
              if (ls.length === 0) return null;
              const subt = ls.reduce((s,l)=>s+l.precio*l.qty,0);
              return (
                <div key={c} className="card" style={{padding: '12px 14px', marginBottom: 10}}>
                  <div className="row-between" style={{marginBottom: 6}}>
                    <div className="row" style={{gap: 8}}>
                      <div style={{
                        width: 26, height: 26, borderRadius: '50%',
                        background: 'var(--gray-100)', color:'var(--black)',
                        display:'flex', alignItems:'center', justifyContent:'center',
                        fontSize: 12, fontWeight: 700, fontFamily: 'var(--mono)',
                      }}>C{c}</div>
                      <span style={{fontSize: 13, fontWeight: 600}}>Comensal {c}</span>
                      <span style={{fontSize: 11, color: 'var(--gray-500)'}}>· {ls.length} ítems</span>
                    </div>
                    <span className="mono" style={{fontSize: 15, fontWeight: 600}}>{fmt(subt)}</span>
                  </div>
                  <div style={{fontSize: 11.5, color:'var(--gray-500)'}}>
                    {ls.map(l => `${l.qty}× ${l.producto}`).join(' · ')}
                  </div>
                  <button className="btn btn-sm btn-primary" style={{marginTop: 10, width: '100%'}}
                    onClick={() => setPagados(p => [...p, subt])}>
                    Cobrar a este comensal
                  </button>
                </div>
              );
            })}
            {/* compartidos */}
            {(() => {
              const ls = lineas.filter(l => !l.comensal);
              if (ls.length === 0) return null;
              const subt = ls.reduce((s,l)=>s+l.precio*l.qty,0);
              return (
                <div className="card" style={{padding: '12px 14px',
                  background: 'var(--gray-50)', borderStyle: 'dashed'}}>
                  <div className="row-between">
                    <span style={{fontSize: 13, fontWeight: 600}}>Compartido</span>
                    <span className="mono" style={{fontSize: 15, fontWeight: 600}}>{fmt(subt)}</span>
                  </div>
                  <div style={{fontSize: 11, color:'var(--gray-500)', marginTop: 2}}>
                    Repartir entre comensales o cobrar aparte
                  </div>
                </div>
              );
            })()}
          </>
        )}
      </div>

      <div style={{
        padding: '10px 12px',
        background: 'var(--white)',
        borderTop: '1px solid var(--gray-200)',
        flexShrink: 0,
      }}>
        <div className="row-between" style={{padding: '0 4px 8px', fontSize: 12, color: 'var(--gray-500)'}}>
          <span>Restante</span>
          <span className="mono" style={{fontWeight: 600, color: restante > 0 ? 'var(--accent)' : 'var(--green)'}}>
            {fmt(Math.max(0, restante))}
          </span>
        </div>
        <button className="btn btn-primary btn-block btn-lg"
          onClick={() => {
            if (mode === 'productos' && totalSel === 0) return;
            onDone();
          }}>
          {mode === 'productos'
            ? `Cobrar ${fmt(totalSel)} seleccionado`
            : restante <= 0
              ? 'Finalizar cobro'
              : 'Cobrar parte y continuar'}
        </button>
      </div>
    </>
  );
}

const { useState: useStateD, useMemo: useMemoD, useEffect: useEffectD } = React;

// ════════════════════════════════════════════════════════
// PEDIDOS — histórico de comandas enviadas en la sesión
// ════════════════════════════════════════════════════════
function ScreenPedidos({ nav, toast }) {
  const { PEDIDOS_INICIAL } = window.YDATA;
  const [filter, setFilter] = useStateD('todos');
  const [search, setSearch] = useStateD('');

  const filtros = [
    { id: 'todos', label: 'Todos' },
    { id: 'cocina', label: 'En cocina' },
    { id: 'parcial', label: 'Parciales' },
    { id: 'servido', label: 'Servidos' },
    { id: 'pagado', label: 'Pagados' },
  ];

  const filtered = PEDIDOS_INICIAL.filter(p => {
    if (filter === 'pagado' && !p.pagado) return false;
    if (filter === 'cocina' && p.estado !== 'cocina') return false;
    if (filter === 'parcial' && p.estado !== 'parcial') return false;
    if (filter === 'servido' && p.estado !== 'servido') return false;
    if (search && !p.id.includes(search) && !p.mesa.includes(search.toUpperCase())) return false;
    return true;
  });

  const stats = {
    total: PEDIDOS_INICIAL.length,
    pagados: PEDIDOS_INICIAL.filter(p => p.pagado).length,
    importe: PEDIDOS_INICIAL.reduce((s,p) => s + p.total, 0),
  };

  return (
    <>
      <div className="tb">
        <div className="tb-title">
          <span className="tb-title-main">Mis pedidos</span>
          <span className="tb-title-sub">Turno cena · {stats.total} comandas · {fmt(stats.importe)}</span>
        </div>
        <button className="tb-action"><Icon name="filter" size={18}/></button>
      </div>

      {/* Search */}
      <div style={{padding:'10px 12px', background:'var(--white)',
        borderBottom:'1px solid var(--gray-200)', flexShrink: 0}}>
        <div style={{display:'flex', alignItems:'center', gap: 8,
          background:'var(--gray-100)', borderRadius: 10, padding:'8px 12px'}}>
          <Icon name="search" size={14} color="var(--gray-400)"/>
          <input value={search} onChange={e => setSearch(e.target.value)}
            placeholder="Buscar nº ticket o mesa…"
            style={{flex:1, border:'none', background:'transparent',
              outline:'none', fontFamily:'var(--font)', fontSize: 13, color:'var(--black)'}}/>
        </div>
      </div>

      {/* Filter chips */}
      <div style={{display:'flex', gap: 6, padding:'10px 12px',
        background:'var(--white)', borderBottom:'1px solid var(--gray-200)',
        overflowX:'auto', flexShrink: 0}}>
        {filtros.map(f => (
          <button key={f.id} className={`chip ${filter === f.id ? 'active' : ''}`}
            onClick={() => setFilter(f.id)}>{f.label}</button>
        ))}
      </div>

      <div className="content" style={{padding: '12px'}}>
        {filtered.length === 0 ? (
          <div style={{textAlign:'center', padding:'40px 20px', color:'var(--gray-400)'}}>
            <div style={{fontSize: 32, marginBottom: 8}}>📋</div>
            <div style={{fontSize:13}}>Sin pedidos que mostrar</div>
          </div>
        ) : (
          <div style={{display:'flex', flexDirection:'column', gap: 8}}>
            {filtered.map(p => (
              <PedidoCard key={p.id} p={p}
                onClick={() => toast(`Pedido ${p.id} · ${p.mesa}`)}/>
            ))}
          </div>
        )}
      </div>
    </>
  );
}

  const estados = {
    cocina:  { c: 'tag-amber', t: 'En cocina', icon: 'flame' },
    parcial: { c: 'tag-blue',  t: 'Parcial', icon: 'clock' },

  return (

      padding: '12px 14px',
      display: 'flex', alignItems: 'center', gap: 12,
      textAlign: 'left',

      <div style={{
        width: 40, height: 40, borderRadius: 10,
        background: 'var(--gray-100)',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        fontFamily: 'var(--mono)', fontSize: 13, fontWeight: 600,
        color: 'var(--black)',
        flexShrink: 0,
      }}>{p.mesa}</div>
      <div style={{flex: 1, minWidth: 0}}>
        <div className="row" style={{gap: 6}}>
          <span className="mono" style={{fontSize: 12, fontWeight: 600, color:'var(--black)'}}>{p.id}</span>
          <span className={`tag ${e.c}`}>
            <Icon name={e.icon} size={9}/> {e.t}

      </div>
      <div style={{textAlign: 'right'}}>
        <div className="mono" style={{fontSize: 14, fontWeight: 600, color: 'var(--black)'}}>{fmt(p.total)}</div>
        <Icon name="chevronRight" size={14} color="var(--gray-300)"/>
      </div>
    </button>

}

// ════════════════════════════════════════════════════════
// COCINA — avisos en tiempo real
// ════════════════════════════════════════════════════════
function ScreenCocina({ nav, toast, onClearAviso }) {
  const { AVISOS_COCINA } = window.YDATA;
  const [filter, setFilter] = useStateD('todos');
  const [dismissed, setDismissed] = useStateD([]);

  const filters = [
    { id: 'todos', label: 'Todos', count: AVISOS_COCINA.length },
    { id: 'listo', label: 'Listos', count: AVISOS_COCINA.filter(a=>a.tipo==='listo').length },
    { id: 'demora', label: 'Demoras', count: AVISOS_COCINA.filter(a=>a.tipo==='demora').length },
    { id: 'rotura', label: 'Roturas', count: AVISOS_COCINA.filter(a=>a.tipo==='rotura').length },
  ];

  const visible = AVISOS_COCINA.filter(a =>
    !dismissed.includes(a.id) && (filter === 'todos' || a.tipo === filter));

  return (
    <>
      <div className="tb">
        <div className="tb-title">
          <span className="tb-title-main row" style={{gap:8}}>
            Cocina
            {AVISOS_COCINA.length > 0 && (
              <span style={{
                background: 'var(--accent)', color:'var(--white)',
                fontSize: 10, fontWeight: 700, fontFamily: 'var(--mono)',
                padding: '2px 6px', borderRadius: 100,
              }}>{AVISOS_COCINA.length} avisos</span>
            )}
          </span>
          <span className="tb-title-sub">Notificaciones de cocina y barra</span>
        </div>
        <button className="tb-action" onClick={() => toast('Avisos actualizados')}>
          <Icon name="refresh" size={18}/>
        </button>
      </div>

      <div style={{display:'flex', gap: 6, padding:'10px 12px',
        background:'var(--white)', borderBottom:'1px solid var(--gray-200)',
        overflowX:'auto', flexShrink: 0}}>
        {filters.map(f => (
          <button key={f.id} className={`chip ${filter === f.id ? 'active' : ''}`}
            onClick={() => setFilter(f.id)}>
            {f.label} <span style={{opacity:.6, marginLeft: 4, fontFamily:'var(--mono)'}}>{f.count}</span>
          </button>
        ))}
      </div>

      <div className="content" style={{padding: '12px'}}>
        {visible.length === 0 ? (
          <div style={{textAlign:'center', padding:'40px 20px', color:'var(--gray-400)'}}>
            <div style={{fontSize:32, marginBottom: 8}}>✨</div>
            <div style={{fontSize:14, fontWeight:500, color:'var(--gray-600)'}}>Sin avisos</div>
            <div style={{fontSize:12, marginTop:4}}>Todo bajo control</div>
          </div>
        ) : (
          <div style={{display:'flex', flexDirection:'column', gap: 10}}>
            {visible.map(a => (
              <AvisoCard key={a.id} a={a}
                onAck={() => {
                  setDismissed(prev => [...prev, a.id]);
                  onClearAviso && onClearAviso();
                  toast('Aviso atendido');
                }}
                onGoMesa={() => {
                  const m = window.YDATA.MESAS.find(x => x.id === a.mesa);
                  if (m) nav.push({ name: 'mesa', mesa: m });
                }}
              />
            ))}
          </div>
        )}
      </div>
    </>
  );
}

function AvisoCard({ a, onAck, onGoMesa }) {
  const config = {
    listo:  { bg: 'var(--green-soft)', color: 'var(--green)', icon: 'check', label: 'PLATO LISTO' },
    demora: { bg: 'var(--amber-soft)', color: 'var(--amber)', icon: 'clock', label: 'DEMORA' },
    rotura: { bg: 'var(--accent-soft)', color: 'var(--accent)', icon: 'warning', label: 'ROTURA STOCK' },
  };
  const c = config[a.tipo];
  return (
    <div className="card" style={{
      padding: 0, overflow: 'hidden',
      borderColor: a.urgente ? c.color : 'var(--gray-200)',
      borderWidth: a.urgente ? '2px' : '1.5px',
      animation: a.urgente && a.tipo === 'listo' ? 'glow-green 2s ease infinite' : 'none',

// app.jsx — App principal con navigation stack + tabs + animaciones

const { useState: useStateA, useEffect: useEffectA, useRef: useRefA, useMemo: useMemoA } = React;

// Stack-based navigation with animation
function App() {
  // stack: array de { name, ...props }
  // tabRoots: el "tab" actual cuya raíz se muestra cuando stack queda en root
  const [stack, setStack] = useStateA([{ name: 'login' }]);
  const [direction, setDirection] = useStateA('push'); // push | pop | fade
  const [animating, setAnimating] = useStateA(false);
  const [outgoing, setOutgoing] = useStateA(null); // screen instance leaving
  const [toastMsg, setToastMsg] = useStateA(null);
  const [tabCarrito, setTabCarrito] = useStateA([]); // mantener carrito entre push/pop
  const avisosCount = window.YDATA.AVISOS_COCINA.length;

  const top = stack[stack.length - 1];

  const toast = (msg) => {
    setToastMsg(null);
    requestAnimationFrame(() => setToastMsg(msg));
    setTimeout(() => setToastMsg(null), 2400);
  };

  const animate = (dir, mutator) => {
    setOutgoing({ ...top, _animKey: Math.random() });
    setDirection(dir);
    setAnimating(true);
    mutator();
    setTimeout(() => {
      setOutgoing(null);
      setAnimating(false);
    }, 300);
  };

  const nav = {
    push: (s) => animate('push', () => setStack(prev => [...prev, s])),
    pop:  ()   => {
      if (stack.length <= 1) return;
      animate('pop', () => setStack(prev => prev.slice(0, -1)));
    },
    replace: (s) => animate('fade', () => setStack([s])),
    reset: (s) => animate('fade', () => setStack([s])),
  };

  // Render concrete screen based on top.name
  const renderScreen = (s, props = {}) => {
    const common = { nav, toast, ...props };
    switch (s.name) {
      case 'login':
        return <ScreenLogin {...common}/>;
      case 'tabs':
        return <TabsRoot tab={s.tab || 'mesas'} nav={nav} toast={toast}/>;
      case 'mesa':
        return <ScreenMesa mesa={s.mesa} {...common}/>;
      case 'comanda':
        return <ScreenComanda mesa={s.mesa} {...common}/>;
      case 'resumen-comanda':
        return <ScreenResumenComanda mesa={s.mesa} carrito={s.carrito} setCarrito={s.setCarrito} total={s.total} {...common}/>;
      case 'confirmacion':
        return <ScreenConfirmacion mesa={s.mesa} items={s.items} total={s.total} {...common}/>;
      case 'cobro':
        return <ScreenCobro mesa={s.mesa} total={s.total} {...common}/>;
      case 'cambiar-mesa':
        return <ScreenCambiarMesa mesa={s.mesa} mode="cambiar" {...common}/>;
      case 'juntar-mesa':
        return <ScreenCambiarMesa mesa={s.mesa} mode="juntar" {...common}/>;
      default:
        return <div style={{padding: 20}}>Pantalla "{s.name}" no implementada</div>;
    }
  };

  // Animation class assignment:
  // when push: incoming uses enter-push, outgoing uses exit-push
  // when pop:  incoming uses enter-pop,  outgoing uses exit-pop
  // when fade: incoming uses enter-fade, outgoing uses exit-fade
  const enterClass = `enter-${direction}`;
  const exitClass = `exit-${direction}`;

  return (
    <div className="pda-stack">
      {outgoing && (
        <div key={`out-${outgoing._animKey}`} className={`pda-screen ${exitClass}`}>
          {renderScreen(outgoing)}
        </div>
      )}
      <div key={`in-${stack.length}-${top.name}`} className={`pda-screen ${animating ? enterClass : ''}`}>
        {renderScreen(top)}
      </div>
      <Toast message={toastMsg}/>
    </div>
  );
}

// ─── TabsRoot: container con bottom-nav + screen interior ─────
function TabsRoot({ tab: initialTab, nav, toast }) {
  const [tab, setTab] = useStateA(initialTab || 'mesas');
  const [outgoing, setOutgoing] = useStateA(null);
  const [avisos, setAvisos] = useStateA(window.YDATA.AVISOS_COCINA.length);

  const handleTabChange = (newTab) => {
    if (newTab === tab) return;
    setOutgoing({ tab, _key: Math.random() });
    setTab(newTab);
    setTimeout(() => setOutgoing(null), 220);
  };

  const renderTab = (t) => {
    switch (t) {
      case 'mesas':   return <ScreenMesas nav={nav} toast={toast}/>;
      case 'pedidos': return <ScreenPedidos nav={nav} toast={toast}/>;
      case 'cocina':  return <ScreenCocina nav={nav} toast={toast} onClearAviso={() => setAvisos(a => Math.max(0, a-1))}/>;
      case 'perfil':  return <ScreenPerfil nav={nav} toast={toast} onLogout={() => nav.replace({ name: 'login' })}/>;
      default: return null;
    }
  };

  return (
    <div style={{
      display: 'flex', flexDirection: 'column',
      width: '100%', height: '100%',
      position: 'relative',
    }}>
      <div style={{
        flex: 1, position: 'relative', overflow: 'hidden',
        display: 'flex', flexDirection: 'column',
      }}>
        {outgoing && (
          <div key={`outt-${outgoing._key}`} style={{
            position: 'absolute', inset: 0,
            display: 'flex', flexDirection: 'column',
            animation: 'exitFade 220ms ease both',
          }}>
            {renderTab(outgoing.tab)}
          </div>
        )}
        <div key={`tab-${tab}`} style={{
          position: 'absolute', inset: 0,
          display: 'flex', flexDirection: 'column',
          animation: outgoing ? 'enterFade 220ms ease both' : 'none',
        }}>
          {renderTab(tab)}
        </div>
      </div>
      <BottomNav current={tab} onSelect={handleTabChange}
        avisos={avisos} pedidos={0}/>
    </div>
  );
}
