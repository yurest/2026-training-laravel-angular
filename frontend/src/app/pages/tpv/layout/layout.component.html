<div class="layout">
  <div class="sidebar">
    <h2>TPV</h2>

    <button
      class="nav-button"
      [class.active]="isRouteActive('tables')"
      (click)="goToTables()"
    >
      Mesas
    </button>

    <button
      *ngIf="isAdmin()"
      class="nav-button"
      [class.active]="isRouteActive('settings')"
      (click)="goToSettings()"
    >
      Ajustes
    </button>

    <div class="spacer"></div>

    <button class="nav-button" (click)="toggleTheme()">
      {{ isDarkTheme ? 'Modo claro' : 'Modo oscuro' }}
    </button>

    <div class="user-block" *ngIf="user">
      <div class="user-name">{{ user.name }}</div>
      <button (click)="logout()">Salir</button>
    </div>
  </div>

  <div class="content">
    <router-outlet></router-outlet>
  </div>
</div>
