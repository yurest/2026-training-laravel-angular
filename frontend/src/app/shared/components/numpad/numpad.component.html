<div class="numpad">
  @for (key of keys; track key) {
    <button
      class="numpad-btn"
      [class.clear]="key === 'C'"
      [class.backspace]="key === '⌫'"
      (mousedown)="onMouseDown($event)"
      (mouseup)="onMouseUp($event)"
      (click)="onTap(key)"
      >
      {{ key }}
    </button>
  }
</div>
