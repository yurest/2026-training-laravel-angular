<div class="settings-layout">
  <ion-card class="panel-card">
    <ion-card-content>
      <h3 *ngIf="familyMode === 'create'">Crear familia</h3>
      <h3 *ngIf="familyMode === 'edit'">Editar familia</h3>

      <ion-item>
        <ion-label position="stacked">Nombre</ion-label>
        <ion-input
          *ngIf="familyMode === 'create'"
          type="text"
          [(ngModel)]="createFamilyForm.name"
          placeholder="Nombre de la familia"
        ></ion-input>
        <ion-input
          *ngIf="familyMode === 'edit'"
          type="text"
          [(ngModel)]="editFamilyForm.name"
          placeholder="Nombre de la familia"
        ></ion-input>
      </ion-item>

      <ion-item>
        <ion-checkbox
          *ngIf="familyMode === 'create'"
          [(ngModel)]="createFamilyForm.active"
          slot="start"
        ></ion-checkbox>
        <ion-checkbox
          *ngIf="familyMode === 'edit'"
          [(ngModel)]="editFamilyForm.active"
          slot="start"
        ></ion-checkbox>
        <ion-label>Activa</ion-label>
      </ion-item>

      <div class="error-box" *ngIf="familyErrorMessages.length > 0">
        <p class="error-title">Revisa estos campos:</p>
        <ul>
          <li *ngFor="let error of familyErrorMessages">{{ error }}</li>
        </ul>
      </div>

      <div class="form-actions" *ngIf="familyMode === 'create'">
        <ion-button expand="block" (click)="createFamily()">
          Crear familia
        </ion-button>
      </div>

      <div class="form-actions edit-actions" *ngIf="familyMode === 'edit'">
        <ion-button color="medium" (click)="cancelEditFamily()">
          Cancelar
        </ion-button>
        <ion-button (click)="saveEditFamily()">Guardar cambios</ion-button>
      </div>
    </ion-card-content>
  </ion-card>

  <ion-card class="panel-card">
    <ion-card-content>
      <h3>Familias</h3>

      <ion-item>
        <ion-label position="stacked">Buscar</ion-label>
        <ion-input
          type="text"
          [(ngModel)]="familySearchTerm"
          (ngModelChange)="onFamilySearchChange()"
          placeholder="Buscar por nombre"
        ></ion-input>
      </ion-item>

      <ion-button
        fill="outline"
        size="small"
        *ngIf="familySearchTerm"
        (click)="clearFamilySearch()"
      >
        Limpiar
      </ion-button>

      <div *ngIf="filteredFamilies.length === 0" class="empty-state">
        No hay familias para mostrar.
      </div>

      <div class="users-list" *ngIf="filteredFamilies.length > 0">
        <div *ngFor="let family of filteredFamilies" class="user-row">
          <div class="user-info">
            <strong>{{ family.name }}</strong>
            <span>Estado: {{ family.active ? 'Activa' : 'Inactiva' }}</span>
          </div>

          <div class="row-actions">
            <ion-button
              color="warning"
              size="small"
              (click)="startEditFamily(family)"
            >
              Editar
            </ion-button>

            <ion-button
              color="danger"
              size="small"
              (click)="deleteFamily(family)"
            >
              Borrar
            </ion-button>
          </div>
        </div>
      </div>
    </ion-card-content>
  </ion-card>
</div>
