<div class="summary-section ion-padding">
  <h3>Pedido actual</h3>

  <div *ngIf="orderLines.length === 0">
    <p>No hay productos añadidos todavía.</p>
  </div>

  <div *ngFor="let line of orderLines" class="order-line">
    <div>
      <strong>{{ line.name }}</strong>
      <div>{{ line.price / 100 | number: '1.2-2' }} € unidad</div>
    </div>

    <div class="line-actions">
      <ion-button size="small" fill="outline" (click)="decreaseLine.emit(line)">
        -
      </ion-button>

      <span>x{{ line.quantity }}</span>

      <ion-button size="small" fill="outline" (click)="increaseLine.emit(line)">
        +
      </ion-button>

      <ion-button size="small" color="danger" (click)="deleteLine.emit(line)">
        Borrar
      </ion-button>
    </div>

    <span>{{ getLineTotal(line) / 100 | number: '1.2-2' }} €</span>
  </div>

  <hr />

  <h3>Total: {{ getOrderTotal() / 100 | number: '1.2-2' }} €</h3>

  <ion-button
    expand="block"
    [disabled]="orderLines.length === 0"
    (click)="checkout.emit()"
  >
    Cobrar pedido
  </ion-button>
</div>
