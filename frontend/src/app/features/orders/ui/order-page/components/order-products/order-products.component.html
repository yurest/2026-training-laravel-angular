<div class="products-section">
  <h3>Productos</h3>

  <ion-card
    *ngFor="let product of products"
    (click)="productSelected.emit(product)"
  >
    <ion-card-content>
      <h4>{{ product.name }}</h4>
      <p>{{ product.price / 100 | number: '1.2-2' }} €</p>
    </ion-card-content>
  </ion-card>
</div>
