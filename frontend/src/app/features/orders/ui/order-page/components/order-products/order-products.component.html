<div class="products-section">
  <h3>Productos</h3>

  <div class="families-list">
    <ion-button
      size="small"
      [fill]="selectedFamilyId === null ? 'solid' : 'outline'"
      (click)="selectFamily(null)"
    >
      Todas
    </ion-button>

    <ion-button
      *ngFor="let family of families"
      size="small"
      [fill]="selectedFamilyId === family.id ? 'solid' : 'outline'"
      (click)="selectFamily(family.id)"
    >
      {{ family.name }}
    </ion-button>
  </div>

  <div *ngFor="let family of getVisibleFamilies()" class="family-section">
    <h4>{{ family.name }}</h4>

    <div class="products-grid">
      <ion-card
        *ngFor="let product of getProductsByFamily(family.id)"
        (click)="productSelected.emit(product)"
      >
        <img
          *ngIf="product.image_src; else noImage"
          class="product-image"
          [src]="product.image_src"
          [alt]="product.name"
        />

        <ng-template #noImage>
          <div class="product-placeholder">🍽️</div>
        </ng-template>

        <ion-card-content>
          <h5>{{ product.name }}</h5>
          <p>{{ product.price / 100 | number: '1.2-2' }} €</p>
        </ion-card-content>
      </ion-card>
    </div>
  </div>
</div>
