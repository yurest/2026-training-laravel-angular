<ion-content class="ion-padding">
  <h2>Pedido abierto</h2>

  <p *ngIf="isLoading">Cargando pedido...</p>

  <div class="orders-layout" *ngIf="!isLoading">
    <div class="products-section">
      <h3>Productos</h3>

      <ion-card *ngFor="let product of products" (click)="addProduct(product)">
        <ion-card-content>
          <h4>{{ product.name }}</h4>
          <p>{{ product.price / 100 | number: "1.2-2" }} €</p>
        </ion-card-content>
      </ion-card>
    </div>

    <app-order-summary
      [orderLines]="orderLines"
      (increaseLine)="increaseLine($event)"
      (decreaseLine)="decreaseLine($event)"
      (deleteLine)="deleteLine($event)"
      (checkout)="checkout()"
    ></app-order-summary>
  </div>
</ion-content>
