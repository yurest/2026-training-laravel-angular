<div *ngIf="isOpen" class="success-overlay" (click)="onOverlayClick()">
  <div class="success-content" (click)="$event.stopPropagation()">
    <div class="success-circle">
      <svg class="success-check" viewBox="0 0 52 52">
        <circle class="success-circle-bg" cx="26" cy="26" r="25" fill="none"></circle>
        <path class="success-check-path" fill="none" d="M14.1 27.2l7.1 7.2 16.7-16.8"></path>
      </svg>
    </div>
    <div class="success-text">Pago completado</div>

    <div *ngIf="paymentTicketText || (finalTicketText && showFinalTicket)" class="ticket-preview">
      <div class="preview-title">Vista previa</div>
      <pre *ngIf="paymentTicketText" class="preview-box">{{ paymentTicketText }}</pre>
      <pre *ngIf="finalTicketText && showFinalTicket" class="preview-box">{{ finalTicketText }}</pre>
    </div>

    <div *ngIf="paymentTicketText || (finalTicketText && showFinalTicket)" class="preview-actions">
      <button *ngIf="paymentTicketText" class="preview-btn" (click)="onPrintPayment()">Imprimir ticket de pago</button>
      <button *ngIf="finalTicketText && showFinalTicket" class="preview-btn" (click)="onPrintFinal()">Imprimir ticket final</button>
      <button class="preview-btn outline" (click)="onCloseClick()">Cerrar</button>
    </div>
  </div>
</div>
