<app-card>
  <div class="method-title">Desglose por método</div>
  <div class="method-bar">
    @for (method of methods | keyvalue; track method) {
      <div
        class="method-segment"
        [style.flex]="method.value"
        [style.background]="getMethodColor(method.key)"
      ></div>
    }
  </div>
  @for (method of methods | keyvalue; track method) {
    <div class="method-row">
      <div class="method-info">
        <div class="method-dot" [style.background]="getMethodColor(method.key)"></div>
        <span class="method-label">{{ getMethodLabel(method.key) }}</span>
      </div>
      <div class="method-values">
        <span class="method-amount">{{ formatCents(method.value) }}</span>
        <span class="method-percentage">{{ getPercentage(method.value) }}%</span>
      </div>
    </div>
  }
  @if (getTotal() === 0) {
    <div class="method-empty">
      Sin datos de pago
    </div>
  }
</app-card>
