<div class="gestion-section-grid">
  <div class="gestion-card">
    <div class="gestion-card-title">Usuarios del restaurante</div>
    <div class="gestion-row-list">
      @for (user of users(); track user; let i = $index) {
        <div
          class="gestion-row-item"
          [class.active]="isSelected(i)"
          (click)="onSelect(i)"
          >
          <strong>{{ user.name }}</strong><br />
          <span class="user-meta-email">{{ user.email }}</span>
          <span class="user-role-badge" [ngClass]="getRoleBadgeClass(user.role)">{{ getRoleLabel(user.role) }}</span>
        </div>
      }
    </div>
  </div>
  <div class="gestion-card">
    <div class="gestion-card-title">Editar usuario seleccionado</div>
    <form class="gestion-form" (ngSubmit)="onSubmit()">
      <div class="gestion-form-actions form-actions-start">
        <button type="button" class="btn-small" (click)="onCreate()">Nuevo usuario</button>
        @if (canDelete()) {
          <button type="button" class="btn-small" (click)="onDelete()">Eliminar</button>
        }
      </div>
      <div>
        <label class="form-label" for="mg-user-name">Nombre</label>
        <input id="mg-user-name" class="form-input" [ngModel]="formData().name" (ngModelChange)="updateForm('name', $event)" name="mg-user-name" placeholder="Nombre y apellidos" required />
      </div>
      <div class="gestion-form-grid">
        <div>
          <label class="form-label" for="mg-user-email">Email</label>
          <input id="mg-user-email" type="email" class="form-input" [ngModel]="formData().email" (ngModelChange)="updateForm('email', $event)" name="mg-user-email" placeholder="usuario@restaurante.com" required />
        </div>
        <div>
          <label class="form-label" for="mg-user-role">Rol</label>
          <select id="mg-user-role" class="form-input" [ngModel]="formData().role" (ngModelChange)="updateForm('role', $event)" name="mg-user-role" required>
            @for (option of roleOptions(); track option) {
              <option [value]="option.value">{{ option.label }}</option>
            }
          </select>
        </div>
      </div>
      <div class="gestion-form-grid">
        <div>
          <label class="form-label" for="mg-user-password">Contraseña</label>
          <input id="mg-user-password" type="password" class="form-input" [ngModel]="formData().password" (ngModelChange)="updateForm('password', $event)" name="mg-user-password" placeholder="Dejar vacio para mantener la actual" />
        </div>
        <div>
          <label class="form-label" for="mg-user-pin">PIN (4 digitos)</label>
          <input id="mg-user-pin" type="text" maxlength="4" class="form-input" [ngModel]="formData().pin" (ngModelChange)="updateForm('pin', $event)" name="mg-user-pin" placeholder="1234" />
        </div>
      </div>
      <div class="gestion-form-actions">
        <button class="btn-login btn-login-inline" type="submit" [disabled]="isSaving()">
          {{ isSaving() ? 'Guardando...' : 'Guardar cambios' }}
        </button>
      </div>
    </form>
  </div>
</div>
